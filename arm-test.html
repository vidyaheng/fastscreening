<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>FAST · Arm Drift Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');
  :root {
    --bg:#F4F6F8; --surface:#FFFFFF; --surface-alt:#FAFBFC; --border:#D4DEE8;
    --blue:#2B7DE9; --green:#1FA98F; --red:#E5544E; --amber:#E89B3C;
    --text:#1B2A3A; --muted:#5A6B7B; --muted2:#94A3B2; --radius:18px;
    --shadow:0 2px 4px rgba(27,42,58,0.06), 0 8px 24px rgba(27,42,58,0.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);font-family:'IBM Plex Sans Thai','Manrope',-apple-system,sans-serif;color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  .num{font-family:'Manrope';font-variant-numeric:tabular-nums}

  /* lang screen */
  #lang-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px 28px}
  .lang-logo{font-size:12px;font-weight:600;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
  .lang-title{font-size:30px;font-weight:800;text-align:center;letter-spacing:-0.5px}
  .disclaimer-box{background:#FCF3E6;border:1px solid rgba(232,155,60,.25);border-radius:14px;padding:13px 16px;font-size:13px;color:#C77F28;line-height:1.55;text-align:center;max-width:310px;font-weight:500}
  .lang-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
  .lang-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .12s,box-shadow .12s;width:100%;box-shadow:var(--shadow)}
  .lang-btn:active{transform:scale(0.98)}
  .lang-flag{font-size:26px}
  .lang-name{font-size:17px;font-weight:700;color:var(--text);display:block;text-align:left}
  .lang-native{font-size:13px;color:var(--muted);display:block;text-align:left}

  /* test screen */
  #test-screen{flex:1;display:none;flex-direction:column}
  #top-bar{padding:16px 22px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .top-label{font-size:11px;font-weight:600;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase}
  
  /* ขวาบน: จัดกลุ่มปุ่มเปลี่ยนภาษากับจุดสถานะ */
  .top-right{display:flex;align-items:center;gap:14px}
  .back-lang-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:8px;transition:background 0.2s}
  .back-lang-btn:active{background:rgba(255,255,255,0.05);color:var(--text)}
  
  .step-dots{display:flex;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s}
  .dot.active{background:var(--blue)} .dot.done{background:var(--green)}

  #result-row{display:flex;gap:10px;padding:10px 22px 0;flex-shrink:0}
  .rcard{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 8px;text-align:center;display:flex;flex-direction:column;gap:3px;transition:border-color .4s,opacity .3s;opacity:.45;box-shadow:var(--shadow)}
  .rcard.active{opacity:1;border-color:var(--blue)} .rcard.pass{opacity:1;border-color:rgba(16,185,129,.55)} .rcard.fail{opacity:1;border-color:rgba(239,68,68,.55)}
  .rcard-arm{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  .rcard-icon{font-size:20px;line-height:1.3} .rcard-lbl{font-size:12px;font-weight:600;color:var(--muted)}
  .rcard.pass .rcard-lbl{color:var(--green)} .rcard.fail .rcard-lbl{color:var(--red)}

  #mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 24px;gap:10px;min-height:0}

  .arm-wrap{position:relative;width:150px;height:150px;flex-shrink:0}
  .arm-ring-outer{position:absolute;inset:-11px;border-radius:50%;border:3px solid transparent;transition:border-color .4s}
  .arm-ring-outer.alert{border-color:rgba(239,68,68,0.45);animation:pulse-ring 1s ease-in-out infinite}
  @keyframes pulse-ring{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.5}}
  .arm-circle{width:150px;height:150px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:border-color .3s,background .3s;background:var(--surface)}
  .arm-circle.waiting{border-color:var(--amber);background:rgba(245,158,11,.07)}
  .arm-circle.stable{border-color:var(--green);background:rgba(16,185,129,.07)}
  .arm-circle.drifting{border-color:var(--red);background:rgba(239,68,68,.07)}
  .arm-icon{font-size:58px}

  #warn-banner{display:none;width:100%;max-width:290px;background:rgba(245,158,11,.10);border:1.5px solid rgba(245,158,11,.35);border-radius:12px;padding:11px 14px;text-align:center;flex-direction:column;gap:3px}
  .warn-title{font-size:15px;font-weight:700;color:var(--amber)}
  .warn-sub{font-size:12px;color:var(--muted);line-height:1.5}

  #instr{font-size:19px;font-weight:600;text-align:center;line-height:1.5;max-width:290px}
  #sub-instr{font-size:14px;color:var(--muted);text-align:center;line-height:1.6;max-width:270px;min-height:28px;font-weight:500}

  #pre-cd{display:none;font-family:'Manrope',monospace;font-size:80px;font-weight:800;color:var(--amber);line-height:1;animation:pop .4s ease}
  @keyframes pop{from{transform:scale(1.4);opacity:.3}to{transform:scale(1);opacity:1}}
  /* แขนงอ → เหยียดตรง วนลูป (สื่อว่าต้องยกแขนขึ้นมาเหยียดตรง) */
  @keyframes forearm-extend{
    0%   {transform:rotate(-55deg)}
    45%  {transform:rotate(0deg)}
    75%  {transform:rotate(0deg)}
    100% {transform:rotate(-55deg)}
  }
  #forearm-grp{animation:forearm-extend 2.4s ease-in-out infinite}

  #cd-wrap{display:none;flex-direction:column;align-items:center}
  .cd-svg-wrap{position:relative;width:86px;height:86px}
  .cd-svg{transform:rotate(-90deg)}
  .cd-track{fill:none;stroke:var(--border);stroke-width:4}
  .cd-prog{fill:none;stroke:var(--blue);stroke-width:4;stroke-linecap:round;stroke-dasharray:226;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
  .cd-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .cd-num{font-family:'Manrope',monospace;font-size:34px;font-weight:800;line-height:1}
  .cd-unit{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

  #drift-wrap{display:none;flex-direction:column;gap:5px;width:100%;max-width:240px}
  .drift-row{display:flex;justify-content:space-between;align-items:baseline}
  .drift-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
  .drift-num{font-family:'Manrope',monospace;font-size:16px;font-weight:700;color:var(--text)}
  .drift-track{height:9px;background:var(--border);border-radius:5px;overflow:hidden}
  .drift-fill{height:100%;width:0;border-radius:5px;background:var(--green);transition:width .1s,background .25s}

  #final-banner{display:none;width:100%;max-width:280px;border-radius:14px;padding:15px;text-align:center;flex-direction:column;gap:5px}
  #final-banner.ok{background:rgba(16,185,129,.10);border:1.5px solid rgba(16,185,129,.30)}
  #final-banner.bad{background:rgba(239,68,68,.10);border:1.5px solid rgba(239,68,68,.30)}
  .fb-icon{font-size:28px} .fb-title{font-size:18px;font-weight:700} .fb-sub{font-size:13px;color:var(--muted);line-height:1.6}
  #final-banner.ok .fb-title{color:var(--green)} #final-banner.bad .fb-title{color:var(--red)}

  #action-btn{display:block;width:calc(100% - 44px);margin:0 22px 30px;min-height:60px;border-radius:15px;border:none;font-family:'IBM Plex Sans Thai',sans-serif;font-size:17px;font-weight:600;cursor:pointer;color:#fff;background:var(--blue);transition:transform .12s,background .3s;flex-shrink:0;box-shadow:0 6px 18px rgba(43,125,233,0.28)}
  #action-btn:active{transform:scale(.97)}
  #action-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
  #action-btn.green{background:var(--green)} #action-btn.red{background:var(--red)}

  /* ── ปุ่มภาษา: ย้ายไปอยู่ใน top-bar เพื่อไม่ให้ซ้อนกับจุดสถานะ ── */
  #lang-sw-fixed {
    position: static; z-index: 1;
    display: none; gap: 4px; flex-shrink: 0;
  }
  #lang-sw-fixed.show { display: flex; }
  .lsf-btn {
    background: rgba(27,42,58,0.06);
    border: 1px solid rgba(27,42,58,0.16);
    color: var(--muted); border-radius: 8px;
    min-width: 34px; height: 30px; padding: 0 8px;
    font-size: 11px; font-weight: 800; cursor: pointer;
    font-family: 'Manrope', sans-serif;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .lsf-btn:active { background: var(--blue); color: #fff; }
  .lsf-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* ภาพสาธิตแบบลายเส้น: เห็นคน + แขน + โทรศัพท์ + ทิศหน้าจอชัดเจน */
  #pose-guide{display:none;margin:2px auto 0;width:min(310px,92vw);flex-shrink:0}
  .pose-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:10px 12px 9px;box-shadow:var(--shadow)}
  .pose-title{font-size:13px;font-weight:800;text-align:center;color:var(--text);margin-bottom:4px}
  .pose-sub{font-size:12px;font-weight:600;text-align:center;color:var(--muted);margin-top:3px}
  .pose-svg{width:100%;height:auto;display:block}
  .pose-person{fill:none;stroke:var(--text);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
  .pose-arm{fill:none;stroke:var(--blue);stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
  .pose-phone{fill:#fff;stroke:var(--green);stroke-width:4}
  .pose-arrow{fill:none;stroke:var(--amber);stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
  .pose-label{font-family:'IBM Plex Sans Thai','Manrope',sans-serif;font-size:12px;font-weight:700;fill:var(--muted)}
  .pose-side{display:none}.pose-side.active{display:block}


  /* ─────────────────────────────────────────────
     Face-test style alignment: dark glass HUD
     - remove old 3-dot step indicator
     - match phone frame, dark background, glass panels/buttons
     ───────────────────────────────────────────── */
  :root {
    --col-blue-glass:   rgba(15, 32, 67, 0.55);
    --col-orange-glass: rgba(214, 116, 17, 0.65);
    --col-green-glass:  rgba(20, 108, 81, 0.6);
    --col-red-glass:    rgba(186, 38, 38, 0.65);
    --col-bg: #0E1620;
    --bg: var(--col-bg);
    --surface: rgba(14,22,32,0.72);
    --surface-alt: rgba(8,12,16,0.55);
    --border: rgba(255,255,255,0.16);
    --text: #FFFFFF;
    --muted: rgba(255,255,255,0.68);
    --muted2: rgba(255,255,255,0.45);
    --shadow: 0 16px 40px rgba(0,0,0,0.45);
  }
  html { background:#10141d; display:flex; justify-content:center; align-items:center; min-height:100dvh; }
  body {
    background: radial-gradient(circle at 50% 18%, rgba(43,125,233,0.20), transparent 34%), var(--col-bg);
    width:390px; max-width:100vw;
    height:844px; max-height:100dvh;
    position:relative;
    box-shadow:0 0 0 1px rgba(255,255,255,0.08), 0 24px 60px rgba(0,0,0,0.6);
  }
  @media (min-width:500px){ body{ border-radius:40px; height:min(844px,100dvh); } }

  #test-screen{ position:relative; overflow:hidden; }
  #top-bar{
    position:absolute; top:14px; left:14px; right:14px; z-index:125;
    padding:0; display:flex; align-items:center; justify-content:space-between;
  }
  .top-label{
    color:rgba(255,255,255,0.82); font-size:11px; font-weight:800;
    letter-spacing:1.2px; text-transform:uppercase;
    background:rgba(0,0,0,0.46); border:1px solid rgba(255,255,255,0.18);
    border-radius:10px; padding:7px 12px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .top-right{ gap:5px; }
  .step-dots{ display:none !important; } /* ไม่จำเป็นแล้ว ใช้ flow/ปุ่มนำทางแทน */
  .dot{ display:none !important; }

  #lang-sw-fixed{ position:static; display:none; gap:5px; }
  #lang-sw-fixed.show{ display:flex; }
  .lsf-btn{
    background:rgba(0,0,0,0.60); border:1px solid rgba(255,255,255,0.25); color:#fff;
    border-radius:9px; min-width:38px; height:30px; padding:0 9px;
    font-size:11px; font-weight:800; letter-spacing:0.5px;
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  .lsf-btn.active{ background:var(--blue); border-color:var(--blue); color:#fff; }

  #result-row{
    position:absolute; top:54px; left:50%; transform:translateX(-50%); z-index:106;
    width:auto; min-width:270px; padding:0; gap:8px;
    background:rgba(8,12,16,0.50); border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:7px 10px;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .rcard{
    min-width:116px; background:transparent; border:none; box-shadow:none; border-radius:10px;
    padding:2px 6px; opacity:0.65; gap:1px;
  }
  .rcard.active{ opacity:1; background:rgba(43,125,233,0.22); border:none; }
  .rcard.pass{ opacity:1; background:rgba(31,169,143,0.20); border:none; }
  .rcard.fail{ opacity:1; background:rgba(229,84,78,0.22); border:none; }
  .rcard-arm{ color:rgba(255,255,255,0.50); font-size:9px; letter-spacing:1.4px; }
  .rcard-icon{ font-size:15px; line-height:1.1; }
  .rcard-lbl{ color:rgba(255,255,255,0.70); font-size:11px; }

  #mid{ padding:104px 18px 130px; gap:10px; justify-content:center; }
  .arm-wrap{ width:118px; height:118px; }
  .arm-circle{ width:118px; height:118px; background:rgba(14,22,32,0.70); border-color:rgba(255,255,255,0.18); backdrop-filter:blur(16px); }
  .arm-icon{ font-size:48px; }
  .arm-circle.waiting{ border-color:rgba(232,155,60,.55); background:rgba(214,116,17,0.18); }
  .arm-circle.stable{ border-color:rgba(31,169,143,.55); background:rgba(20,108,81,0.22); }
  .arm-circle.drifting{ border-color:rgba(229,84,78,.65); background:rgba(186,38,38,0.24); }

  .pose-card{
    background:rgba(8,12,16,0.54); border:1px solid rgba(255,255,255,0.13);
    border-radius:18px; box-shadow:0 12px 30px rgba(0,0,0,0.35);
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  }
  .pose-title{ color:#fff; }
  .pose-sub{ color:rgba(255,255,255,0.68); }
  .pose-person{ stroke:rgba(255,255,255,0.88); }
  .pose-phone{ fill:rgba(255,255,255,0.95); }
  .pose-label{ fill:rgba(255,255,255,0.70); }

  #instr{ color:#fff; font-size:19px; text-shadow:0 3px 14px rgba(0,0,0,0.45); }
  #sub-instr{ color:rgba(255,255,255,0.68); }
  #warn-banner{
    background:var(--col-orange-glass); border:1px solid rgba(255,255,255,0.18); color:#fff;
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  }
  .warn-title{ color:#fff; }
  .warn-sub{ color:rgba(255,255,255,0.82); }

  #cd-wrap{ margin-top:2px; }
  .cd-svg-wrap{ width:112px; height:112px; }
  .cd-svg{ width:112px; height:112px; }
  .cd-track{ stroke:rgba(255,255,255,0.18); }
  .cd-prog{ stroke:#fff; }
  .cd-num{ color:#fff; font-size:42px; }
  .cd-unit{ color:rgba(255,255,255,0.60); }

  #drift-wrap{
    background:rgba(8,12,16,0.50); border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:9px 12px; max-width:260px;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .drift-lbl{ color:rgba(255,255,255,0.55); }
  .drift-num{ color:#fff; }
  .drift-track{ background:rgba(255,255,255,0.16); }

  #final-banner{
    background:rgba(8,12,16,0.52) !important; border:1px solid rgba(255,255,255,0.16) !important;
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  }
  .fb-sub{ color:rgba(255,255,255,0.70); }

  #action-btn{
    position:absolute; bottom:12px; left:12px; right:12px; z-index:110;
    width:auto; margin:0; min-height:58px; border-radius:18px;
    background:var(--col-blue-glass); border:1px solid rgba(255,255,255,0.20);
    box-shadow:0 16px 40px rgba(0,0,0,0.45);
    backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px);
  }
  #action-btn.green{ background:var(--col-green-glass); }
  #action-btn.red{ background:var(--col-red-glass); }

  #fast-nav-btn{
    position:absolute !important; bottom:84px !important; left:12px !important; right:12px !important;
    width:auto !important; margin:0 !important; z-index:111 !important;
    background:#2B7DE9 !important; border:1px solid rgba(255,255,255,0.22) !important;
    box-shadow:0 10px 28px rgba(0,0,0,0.38) !important;
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  }

  #lang-screen{
    background:rgba(14,22,32,0.95); color:#fff;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .lang-logo{ color:rgba(255,255,255,0.62); }
  .lang-btn{ background:rgba(255,255,255,0.10); border-color:rgba(255,255,255,0.18); box-shadow:0 10px 24px rgba(0,0,0,0.28); }
  .lang-name{ color:#fff; }
  .lang-native{ color:rgba(255,255,255,0.62); }
  .disclaimer-box{ background:rgba(214,116,17,0.20); border-color:rgba(255,184,77,0.26); color:#FFB84D; }



  /* ─────────────────────────────────────────────
     FINAL ARM UI — one-person female line guide
     ───────────────────────────────────────────── */
  #lang-screen{display:none !important;}
  #test-screen{display:flex !important;}
  body{background:radial-gradient(circle at 50% 8%, rgba(43,125,233,.24), transparent 32%),#050910;}
  #arm-home-btn{
    position:absolute;top:18px;left:18px;z-index:120;width:44px;height:44px;border-radius:22px;
    border:1px solid rgba(255,255,255,.20);background:rgba(255,255,255,.08);color:#fff;
    font-size:24px;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;
    box-shadow:0 10px 26px rgba(0,0,0,.32);
  }
  #top-bar{top:18px;left:78px;right:18px;height:48px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;}
  .top-spacer{display:block;}
  .top-label{grid-column:2;background:transparent;border:none;padding:0;color:#fff;font-size:22px;font-weight:800;letter-spacing:.2px;text-transform:none;text-shadow:0 4px 18px rgba(0,0,0,.65);}
  .top-right{grid-column:3;justify-content:flex-end;}
  #lang-sw-fixed.show{display:flex;background:rgba(8,12,16,.56);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:4px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
  .lsf-btn{height:38px;min-width:46px;border-radius:15px;background:transparent;border:none;color:#fff;font-size:16px;font-weight:700;}
  .lsf-btn.active{background:linear-gradient(180deg,#2388ff,#0d58b8);box-shadow:0 0 0 1px rgba(73,158,255,.6),0 0 18px rgba(43,125,233,.55);}

  #result-row{top:88px;left:18px;right:18px;transform:none;width:auto;min-width:0;height:72px;border-radius:22px;padding:10px 14px;background:rgba(12,18,28,.62);}
  #result-row:after{content:"";position:absolute;left:50%;top:16px;bottom:16px;width:1px;background:rgba(255,255,255,.16);}
  .rcard{min-width:0;flex-direction:row;align-items:center;justify-content:center;gap:10px;padding:0 8px;}
  .rcard-icon{font-size:24px;width:44px;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);color:#fff;}
  .rcard.active .rcard-icon{background:rgba(43,125,233,.18);box-shadow:0 0 18px rgba(43,125,233,.55);}
  .rcard-arm{font-size:17px;letter-spacing:0;text-transform:none;color:#fff;font-weight:800;display:block;text-align:left;}
  .rcard-lbl{font-size:13px;color:rgba(255,255,255,.78);display:block;text-align:left;}
  .rcard{flex-wrap:wrap;align-content:center;}
  .rcard .rcard-arm,.rcard .rcard-lbl{width:calc(100% - 58px);}

  #mid{padding:174px 14px 96px;justify-content:flex-start;gap:10px;overflow:hidden;}
  .arm-wrap{display:none;}
  #instr{font-size:30px;line-height:1.15;font-weight:800;max-width:100%;margin-top:2px;}
  #sub-instr{font-size:18px;color:#2D8CFF;max-width:100%;min-height:0;font-weight:800;line-height:1.35;}
  #pose-guide{width:100%;max-width:none;margin:6px 0 0;}
  .pose-card{border-radius:22px;padding:12px;background:rgba(11,18,28,.66);border-color:rgba(255,255,255,.14);box-shadow:0 14px 35px rgba(0,0,0,.40), inset 0 0 28px rgba(43,125,233,.05);}
  .pose-title,.pose-subtitle{display:none;}
  .pose-svg{height:auto;max-height:300px;}
  .pose-bg{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.10);stroke-width:1;}
  .pose-line,.pose-arm,.pose-arm-thin,.pose-hand{fill:none;stroke:rgba(255,255,255,.92);stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 4px rgba(255,255,255,.12));}
  .pose-line{stroke-width:2.2;}
  .pose-line.hair{stroke-width:2.5;stroke:rgba(255,255,255,.86);}
  .pose-line.body{stroke-width:2.3;}
  .pose-arm{stroke-width:5.5;}
  .pose-arm-thin{stroke-width:3.5;}
  .pose-hand{stroke-width:2.2;}
  .pose-phone{fill:rgba(255,255,255,.04);stroke:rgba(255,255,255,.94);stroke-width:2.4;rx:5;}
  .pose-phone-detail{stroke:rgba(255,255,255,.9);stroke-width:2;stroke-linecap:round;}
  .pose-eye-line{stroke:#2D8CFF;stroke-width:2;stroke-dasharray:6 8;opacity:.9;}
  .pose-screen-label{fill:#2D8CFF;font-size:17px;font-weight:800;font-family:'IBM Plex Sans Thai','Manrope',sans-serif;}
  .pose-arrow{fill:none;stroke:#2D8CFF;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 7px rgba(43,125,233,.55));}
  .pose-info circle{fill:rgba(43,125,233,.12);stroke:#2D8CFF;stroke-width:2;}
  .pose-info text{fill:#fff;font-size:13px;font-weight:700;font-family:'IBM Plex Sans Thai','Manrope',sans-serif;}
  .pose-info text:first-of-type{fill:#2D8CFF;font-size:17px;font-weight:800;text-anchor:middle;}

  #cd-wrap{position:absolute;left:18px;bottom:114px;width:138px;height:138px;align-items:center;justify-content:center;background:rgba(10,16,25,.52);border:1px solid rgba(255,255,255,.12);border-radius:28px;backdrop-filter:blur(14px);}
  .cd-svg-wrap{width:124px;height:124px;}
  .cd-svg{width:124px;height:124px;}
  .cd-num{font-size:46px;}
  .cd-unit{font-size:14px;color:#2D8CFF;font-weight:800;}
  #drift-wrap{position:absolute;right:18px;bottom:114px;width:194px;max-width:194px;height:138px;justify-content:center;padding:14px;border-radius:22px;background:rgba(10,16,25,.52);}
  .drift-lbl{font-size:16px;text-align:center;color:#fff;letter-spacing:0;text-transform:none;}
  .drift-row{display:flex;flex-direction:column;gap:10px;align-items:center;}
  .drift-num{font-size:34px;line-height:1;}
  .drift-track{height:9px;width:100%;background:linear-gradient(90deg,#34C759 0 33%,#FFD23F 33% 66%,#FF453A 66% 100%);overflow:visible;position:relative;}
  .drift-fill{display:none;}
  .drift-track:before{content:"";position:absolute;left:0;top:-8px;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:10px solid #fff;transform:translateX(var(--drift-pct,0%));}

  #action-btn{min-height:64px;border-radius:24px;background:linear-gradient(180deg,#2388ff,#0d58b8);font-size:24px;font-weight:800;border:1px solid rgba(83,170,255,.6);box-shadow:0 0 24px rgba(43,125,233,.38),0 16px 40px rgba(0,0,0,.45);}
  #warn-banner{max-width:100%;border-radius:18px;padding:14px 16px;}
  .warn-title{font-size:18px;}.warn-sub{font-size:14px;}
  @media (max-height:760px){#mid{padding-top:158px}.pose-svg{max-height:250px}#cd-wrap,#drift-wrap{bottom:92px;height:116px}.cd-svg-wrap,.cd-svg{width:104px;height:104px}.cd-num{font-size:38px}#action-btn{min-height:56px}.top-label{font-size:19px}}

  /* Same-facing female guide: right arm = front arm extended, left arm = far arm extended behind body */
  .image-guide-card{padding:10px;overflow:hidden;}
  .guide-image-wrap{position:relative;width:100%;height:300px;border-radius:18px;overflow:hidden;background:radial-gradient(circle at 65% 35%,rgba(43,125,233,.12),transparent 42%),rgba(255,255,255,.035);}
  .female-guide-svg{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .guide-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center center;display:block;}
  .skin{fill:#d7a076;stroke:#f0c4a3;stroke-width:1.2;}
  .skin-shadow{fill:#bd805b;opacity:.72;}
  .hair{fill:#17110f;stroke:#4b3024;stroke-width:1.2;}
  .shirt{fill:#121c27;stroke:#36506a;stroke-width:1.2;}
  .shirt-dark{fill:#0b121b;opacity:.92;}
  .guide-line{stroke:#2D8CFF;stroke-width:2.2;stroke-dasharray:7 8;stroke-linecap:round;opacity:.95;filter:drop-shadow(0 0 5px rgba(45,140,255,.45));}
  .phone{fill:#121212;stroke:#b7c0ca;stroke-width:2.2;filter:drop-shadow(0 0 5px rgba(0,0,0,.45));}
  .phone-detail{stroke:#d8dee6;stroke-width:1.6;stroke-linecap:round;opacity:.9;}
  .far-arm{opacity:.74;filter:brightness(.72);}
  .near-arm{filter:drop-shadow(0 2px 3px rgba(0,0,0,.42));}
  .inactive-arm{opacity:.88;}
  .face-feature{stroke:#f6d1bb;stroke-width:1.4;stroke-linecap:round;fill:none;}
  .screen-direction{position:absolute;top:102px;right:18px;display:flex;align-items:center;gap:8px;color:#2D8CFF;font-family:'IBM Plex Sans Thai','Manrope',sans-serif;font-weight:800;font-size:18px;line-height:1.25;text-shadow:0 0 10px rgba(45,140,255,.42);}
  .screen-direction b{font-size:44px;line-height:.8;filter:drop-shadow(0 0 7px rgba(43,125,233,.55));}
  .screen-direction.left-dir b{transform:rotate(180deg);}
  .guide-note{margin-top:8px;display:flex;align-items:center;gap:10px;border:1px solid rgba(45,140,255,.38);background:rgba(11,24,39,.78);border-radius:18px;padding:10px 14px;color:#fff;font-size:15px;font-weight:700;line-height:1.35;}
  .guide-info{width:26px;height:26px;min-width:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #2D8CFF;color:#2D8CFF;font-family:'Manrope',sans-serif;font-weight:800;}
  #pose-left:not(.active), #pose-right:not(.active){display:none;}
  @media (max-height:760px){.guide-image-wrap{height:246px}.screen-direction{top:82px;font-size:16px}.screen-direction b{font-size:38px}.guide-note{font-size:13px;padding:8px 12px}}

  .screen-direction{display:none!important;}

/* ═══════════════════════════════
   CONFIG (องศาการดักจับเพื่อความไว)
═══════════════════════════════ */
const MEASURE_SEC   = 10;
const DRIFT_THR     = 10;     // เกิน 10 องศาถือว่าไม่ปกติ (FAIL ทันที)
const DRIFT_WARN    = 5;      // เกิน 5 องศา แถบจะเริ่มเตือนเป็นสีเหลือง
const STABLE_WINDOW = 20;   
const STABLE_RANGE  = 5.0;  
const STABLE_HOLD   = 25;   
const FLAT_Z_THR    = 0.90;
const GAMMA_THR     = 10;
const RETRY_SEC     = 6;
const LPF           = 0.15;

let _speaking  = false;
let _voiceQ    = [];

function speak(txt, onDone) {
  _voiceQ.push({ txt, onDone });
  _drainQueue();
}

function _drainQueue() {
  if (_speaking || !_voiceQ.length) return;
  const { txt, onDone } = _voiceQ.shift();
  if (!window.speechSynthesis) { onDone && onDone(); _drainQueue(); return; }
  _speaking = true;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = T.code; u.rate = 0.93;
  
  const finish = () => {
    _speaking = false;
    onDone && onDone();
    _drainQueue();
  };
  u.onend   = finish;
  u.onerror = finish;
  
  const guard = setTimeout(finish, Math.max(txt.length * 80, 3000));
  u.onend = () => { clearTimeout(guard); finish(); };
  speechSynthesis.speak(u);
}

function clearVoiceQueue() {
  _voiceQ    = [];
  _speaking  = false;
  if (window.speechSynthesis) speechSynthesis.cancel();
}

function speakNow(txt, onDone) {
  clearVoiceQueue();
  speak(txt, onDone);
}

let T       = null;
let phase   = 'IDLE'; 
let arm     = 'left';
let results = { right:null, left:null };

let betaNow   = 0, gammaNow = 0;
let filtVec   = { x:0, y:0, z:1 };
let betaBase  = null;   
let driftMax  = 0;
let driftValues = { right: null, left: null };
let sensorOk  = false;

let betaWindow    = [];
let stableCount   = 0;

let measureTimer  = null;
let mElapsed      = 0;
let voiced4       = false, voiced7 = false;
let retryTimer    = null;
let lastWarnKey   = '';

let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e){}
}
function vibe(p) { if (navigator.vibrate) navigator.vibrate(p); }

function requestSensor(cb) {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(r => { if (r==='granted') { attachSensor(); cb(); } else alert(T.sensorDenied); })
      .catch(() => alert(T.sensorDenied));
  } else {
    if ('ondeviceorientation' in window) { attachSensor(); cb(); }
    else alert(T.sensorUnsupported);
  }
}
function attachSensor() {
  window.addEventListener('deviceorientation', onOrientation, true);
  sensorOk = true;
}
function onOrientation(e) {
  betaNow  = e.beta  ?? 0;
  gammaNow = e.gamma ?? 0;
  const bR = betaNow * Math.PI/180, gR = gammaNow * Math.PI/180;
  const rx = Math.sin(gR), ry = Math.sin(bR)*Math.cos(gR), rz = Math.cos(bR)*Math.cos(gR);
  filtVec.x += LPF*(rx-filtVec.x);
  filtVec.y += LPF*(ry-filtVec.y);
  filtVec.z += LPF*(rz-filtVec.z);

  if (phase === 'CALIB')   tickCalib();
  if (phase === 'MEASURE') tickMeasure();
}

function tickCalib() {
  if (phase !== 'CALIB') return; 

  if (Math.abs(filtVec.z) > FLAT_Z_THR) {
    stableCount = 0; betaWindow = [];
    warnKey('flat', T.warnFlat, T.warnFlatSub, T.vFlat);
    $('arm-circle').className = 'arm-circle waiting';
    return;
  }

  const wrongHand =
    (arm === 'right' && gammaNow >  GAMMA_THR) ||
    (arm === 'left'  && gammaNow < -GAMMA_THR);
  if (wrongHand) {
    stableCount = 0; betaWindow = [];
    warnKey('wrong', T['warnWrong_'+arm], T['warnWrongSub_'+arm], T.vWrongHand);
    $('arm-circle').className = 'arm-circle waiting';
    return;
  }

  betaWindow.push(betaNow);
  if (betaWindow.length > STABLE_WINDOW) betaWindow.shift();

  const bMax = Math.max(...betaWindow);
  const bMin = Math.min(...betaWindow);
  const range = bMax - bMin;

  const isStable = betaWindow.length >= STABLE_WINDOW && range < STABLE_RANGE;

  if (isStable) {
    stableCount++;
    hideWarn();
    $('arm-circle').className  = 'arm-circle stable';
    $('instr').textContent     = T.instrCalib;
    $('sub-instr').textContent = T.subCalib;
    lastWarnKey = '';

    if (stableCount >= STABLE_HOLD) {
      betaBase = (Math.max(...betaWindow) + betaWindow.reduce((a,b)=>a+b,0)/betaWindow.length) / 2;
      phase = 'PRE_MEASURE'; 
      if (retryTimer) { clearInterval(retryTimer); retryTimer = null; }
      
      setTimeout(() => {
        startMeasure();
      }, 1500);
    }
  } else {
    stableCount = 0;
    if (!isWarnVisible()) {
      $('arm-circle').className  = 'arm-circle waiting';
      $('instr').textContent     = T['instrWait_'+arm];
      $('sub-instr').textContent = T['subWait_'+arm];
    }
  }
}

function tickMeasure() {
  if (phase !== 'MEASURE') return;

  const currentDrift = Math.abs(betaNow - betaBase);          
  if (currentDrift > driftMax) {
    driftMax = currentDrift;
  }

  const pct = Math.min(driftMax/DRIFT_THR*100, 100);
  $('drift-fill').style.width = pct + '%';
  const dw = $('drift-wrap'); if (dw) dw.style.setProperty('--drift-pct', `calc(${pct}% - 6px)`);
  $('drift-fill').style.background =
    driftMax >= DRIFT_THR  ? 'var(--red)'   :
    driftMax >= DRIFT_WARN ? 'var(--amber)' : 'var(--green)';
  $('drift-num').textContent = driftMax.toFixed(1) + '°';
  $('arm-circle').className  = driftMax >= DRIFT_THR ? 'arm-circle drifting' : 'arm-circle stable';
  $('arm-ring').className    = driftMax >= DRIFT_THR ? 'arm-ring-outer alert' : 'arm-ring-outer';
  
  if (driftMax >= DRIFT_THR) {
    vibe(60);
    clearInterval(measureTimer); 
    finishArm();
  }
}


function removeFastNavButton() {
  document.querySelectorAll('#fast-nav-btn,.fast-nav-btn').forEach(el => el.remove());
}

function updatePoseGuide() {
  const guide = $('pose-guide');
  if (!guide) return;

  const right = $('pose-right');

  if (dirRight) dirRight.innerHTML = T.subWait_right.split('·')[0].trim().replace('Screen facing','Screen<br>facing').replace('หน้าจอหัน','หน้าจอ<br>หัน').replace('画面を','画面<br>');

function removeArmNavOverlays() {
  ['fast-nav-btn','arm-nav-btn','back-home-btn'].forEach(id => {
    const el = document.getElementById(id);
    if (el && id !== 'back-home-btn') el.remove();

function startWait() {
  removeFastNavButton();
  phase = 'WAIT_VOICE';
  betaWindow = []; stableCount = 0; driftMax = 0; lastWarnKey = '';

  setDot(arm==='left'?0:1, 'active');
  cardState(arm, 'active', '🤚', T.pending);
  $('arm-circle').className = 'arm-circle waiting';
  $('arm-ring').className   = 'arm-ring-outer';
  $('arm-icon').textContent = '🤚';
  $('cd-wrap').style.display    = 'none';
  $('drift-wrap').style.display = 'none';
  $('pre-cd').style.display     = 'none';
  $('final-banner').style.display = 'none';
  hideWarn();
  $('instr').textContent     = T['instrWait_'+arm];
  $('sub-instr').textContent = T['subWait_'+arm];
  $('action-btn').disabled   = true;
  updatePoseGuide();
  if ($('pose-guide')) $('pose-guide').style.display = 'block';

  speakNow(T['vWait_'+arm], () => {
    if (phase === 'WAIT_VOICE') {
      phase = 'CALIB';
      if (retryTimer) clearInterval(retryTimer);
      retryTimer = setInterval(() => {
        if (phase !== 'CALIB') { clearInterval(retryTimer); retryTimer = null; return; }
        speak(T.vCalibRetry);
      }, RETRY_SEC * 1000);
    }
  });
}

function startMeasure() {
  removeFastNavButton();
  phase = 'MEASURE';
  mElapsed = 0; voiced4 = false; voiced7 = false;
  if ($('pose-guide')) $('pose-guide').style.display = 'none';

  $('instr').textContent     = T.instrMeasure;
  $('sub-instr').textContent = T.subMeasure;
  $('cd-wrap').style.display    = 'flex';
  $('drift-wrap').style.display = 'flex';
  $('cd-num').textContent       = MEASURE_SEC;
  $('cd-prog').style.strokeDashoffset = 0;
  
  hideWarn();
  beep(880, 0.15); vibe(120);
  speak(T.vReady);

  const circ = 226;
  measureTimer = setInterval(() => {
    mElapsed++;
    $('cd-num').textContent = MEASURE_SEC - mElapsed;
    $('cd-prog').style.strokeDashoffset = (circ*mElapsed/MEASURE_SEC).toFixed(2);
    if (mElapsed===4 && !voiced4) { voiced4=true; speak(T.vMid4); }
    if (mElapsed===7 && !voiced7) { voiced7=true; speak(T.vMid7); }
    if (mElapsed>=MEASURE_SEC)    { clearInterval(measureTimer); finishArm(); }
  }, 1000);
}

function finishArm() {
  phase = 'BETWEEN';
  const passed = driftMax < DRIFT_THR;
  results[arm] = passed ? 'pass' : 'fail';
  driftValues[arm] = driftMax; // เก็บค่า drift ไว้คำนวณ score

  beep(587, 0.5); vibe(passed ? 200 : [300,100,300]);
  speakNow(T.vDone); 

  setDot(arm==='left'?0:1, 'done');
  cardState(arm, passed?'pass':'fail', passed?'✅':'⚠️', passed?T.passLbl:T.failLbl);
  $('instr').textContent     = T['instrDone_'+arm];
  $('sub-instr').textContent = '';
  $('cd-wrap').style.display    = 'none';
  $('drift-wrap').style.display = 'none';
  $('arm-circle').className = 'arm-circle '+(passed?'stable':'drifting');
  $('arm-ring').className   = 'arm-ring-outer';

  if (arm==='left') {
    $('action-btn').textContent = T.btnNext;
    $('action-btn').className   = '';
    $('action-btn').disabled    = false;
  } else {
    setTimeout(showFinal, 600);
  }
}

// แปลง drift องศา → score 0-100
// drift 0° = 100, drift = DRIFT_THR(10°) = 50, drift 20°+ = 0
function driftToScore(deg) {
  if (deg === null) return 50;
  if (deg <= 0) return 100;
  if (deg < DRIFT_THR) return Math.round(100 - (deg / DRIFT_THR) * 50); // 100→50
  return Math.round(Math.max(0, 50 - ((deg - DRIFT_THR) / DRIFT_THR) * 50)); // 50→0
}

function showFinal() {
  phase = 'DONE'; setDot(2,'done');
  const ok = results.right==='pass' && results.left==='pass';

  // ── คำนวณ FAST score: ใช้แขนที่แย่ที่สุด (max drift) ──
  const scoreR = driftToScore(driftValues.right);
  const scoreL = driftToScore(driftValues.left);
  const armScore = Math.min(scoreR, scoreL); // แขนที่แย่สุดเป็นตัวตัดสิน
  const riskLevel = armScore >= 70 ? 'ok' : armScore >= 45 ? 'warn' : 'bad';

  sessionStorage.setItem('fast_arm', JSON.stringify({
    score: armScore,
    riskLevel,
    passed: ok,
    breakdown: { rightDrift: driftValues.right, leftDrift: driftValues.left, rightScore: scoreR, leftScore: scoreL }
  }));

  // navigation ตาม FAST flow
  handleArmFastFlow();
  const fb = $('final-banner');
  fb.className = ok?'ok':'bad'; fb.style.display='flex';
  $('fb-icon').textContent  = ok?'✅':'⚠️';
  $('fb-title').textContent = ok?T.finalOk:T.finalBad;
  $('fb-sub').textContent   = ok?T.finalOkSub:T.finalBadSub;
  $('instr').textContent     = ok?T.finalOk:T.finalBad;
  $('sub-instr').textContent = '';
  $('arm-icon').textContent  = ok?'🙌':'⚠️';
  $('action-btn').textContent = T.btnRetry;
  $('action-btn').className   = ok?'green':'red';
  $('action-btn').disabled    = false;
  speak(ok?T.vFinalOk:T.vFinalBad);
}

function handleBtn() {
  initAudio();
  if (phase==='IDLE') {
    arm='left'; cardState('left','active','🤚',T.pending);
    $('action-btn').disabled=true;
    if (!sensorOk) requestSensor(()=>startWait()); else startWait();
  } else if (phase==='BETWEEN' && arm==='left') {
    arm='right'; $('action-btn').disabled=true; startWait();
  } else if (phase==='DONE') {
    resetAll();
  }
}

/* 🛠️ ฟังก์ชันสำหรับสลับกลับไปหน้าเลือกภาษา (Reset ทั้งหมดพร้อมย้ายหน้าจอ) */

    lastWarnKey = key;
    speak(voiceTxt);  
  }
}

function refreshArmLanguageUI(){
  if (!T) return;

  // Header / meters
  if ($('top-lbl')) $('top-lbl').textContent = 'FAST · ' + T.topLbl;
  if ($('cd-unit')) $('cd-unit').textContent = T.cdUnit;
  if ($('drift-lbl')) $('drift-lbl').textContent = T.driftLbl;

  // Result cards
  if ($('lbl-r-arm')) $('lbl-r-arm').textContent = T.armRight;
  if ($('lbl-l-arm')) $('lbl-l-arm').textContent = T.armLeft;
  if ($('lbl-right')) $('lbl-right').textContent = results.right ? (results.right === 'pass' ? T.passLbl : T.failLbl) : T.pending;
  if ($('lbl-left'))  $('lbl-left').textContent  = results.left  ? (results.left  === 'pass' ? T.passLbl : T.failLbl) : T.pending;

  // Language buttons
  const code = currentLangCode();
  ['th','en','ja'].forEach(c => {
    const b = $('lsf-' + c);
    if (b) b.classList.toggle('active', c === code);
  });

  // Guide image text
  updatePoseGuide();

  // Warning banner, if visible
  if (isWarnVisible()) {
    if (lastWarnKey === 'flat') {
      $('warn-title').textContent = T.warnFlat;
      $('warn-sub').textContent = T.warnFlatSub;
    } else if (lastWarnKey === 'wrong') {
      $('warn-title').textContent = T['warnWrong_' + arm];
      $('warn-sub').textContent = T['warnWrongSub_' + arm];
    }
  }

  // Main instruction by current phase
  if (phase === 'IDLE' || phase === 'WAIT_VOICE') {
    $('instr').textContent = T['instrWait_' + arm];
    $('sub-instr').textContent = T['subWait_' + arm];
    $('action-btn').textContent = T.btnStart;
  } else if (phase === 'CALIB' || phase === 'PRE_MEASURE') {
    if (!isWarnVisible()) {
      $('instr').textContent = T.instrCalib;
      $('sub-instr').textContent = T.subCalib;
    }
  } else if (phase === 'MEASURE') {
    $('instr').textContent = T.instrMeasure;
    $('sub-instr').textContent = T.subMeasure;
  } else if (phase === 'BETWEEN') {
    $('instr').textContent = T['instrDone_' + arm];
    $('sub-instr').textContent = '';
    if (arm === 'left') $('action-btn').textContent = T.btnNext;
  } else if (phase === 'DONE') {
    const ok = results.right === 'pass' && results.left === 'pass';
    $('fb-title').textContent = ok ? T.finalOk : T.finalBad;
    $('fb-sub').textContent = ok ? T.finalOkSub : T.finalBadSub;
    $('instr').textContent = ok ? T.finalOk : T.finalBad;
    $('sub-instr').textContent = '';
    $('action-btn').textContent = T.btnRetry;

    const navBtn = $('fast-nav-btn');
    if (navBtn) navBtn.textContent = armNavText();
  }
}

function handleArmFastFlow() {
  const mode = sessionStorage.getItem('fast_mode');
  const lang = sessionStorage.getItem('fast_lang') || 'th';
  const allDone = ['fast_face','fast_arm','fast_speech'].every(k => sessionStorage.getItem(k));

  const L = {
    th: { result:'ดูผลรวม FAST →', next:'ทดสอบการพูดต่อ →', home:'กลับหน้าหลัก' },
    en: { result:'View FAST Score →', next:'Continue to Speech →', home:'Back to Home' },
    ja: { result:'FASTスコアを見る →', next:'音声テストへ →', home:'ホームへ' }
  }[lang] || { result:'ดูผลรวม FAST →', next:'ทดสอบการพูดต่อ →', home:'กลับหน้าหลัก' };

  setTimeout(() => {
    const existing = document.getElementById('fast-nav-btn');
    if (existing) existing.remove();
    const btn = document.createElement('button');
    btn.id = 'fast-nav-btn';
    btn.style.cssText = 'width:calc(100% - 44px);margin:0 22px 16px;min-height:54px;border-radius:14px;border:none;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;color:#fff;background:var(--blue)';

    if (mode === 'full') {
      // Full: arm เป็นอันที่ 2 → ไป speech ต่อ
      btn.textContent = L.next;
      btn.onclick = () => window.location.href = 'speech-test.html';
    } else {
      if (allDone) {
        btn.textContent = L.result;
        btn.style.background = 'var(--green)';
        btn.onclick = () => window.location.href = 'result.html';
      } else {
        btn.textContent = L.home;
        btn.onclick = () => window.location.href = 'index.html';
      }
    }
    const actionBtn = $('action-btn');
    actionBtn.parentNode.insertBefore(btn, actionBtn);
  }, 700);
}

// ── No language landing page: start directly and keep TH/EN/JA at top-right ──
(function() {
  const savedLang = sessionStorage.getItem('fast_lang') || 'th';
  const code = (savedLang === 'th' || savedLang === 'en' || savedLang === 'ja') ? savedLang : 'th';
  if (typeof selectLang === 'function') selectLang(code);
})();
</script>
</body>
