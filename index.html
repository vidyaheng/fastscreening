<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FAST · Stroke Screening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#F4F7FA;
    --surface:rgba(255,255,255,.86);
    --surface-solid:#FFFFFF;
    --surface-alt:#F8FAFC;
    --ink:#172536;
    --ink-soft:#5A6B7B;
    --ink-faint:#94A3B2;
    --clinical:#2B7DE9;
    --clinical-deep:#0D58B8;
    --clinical-soft:#EAF2FD;
    --mint:#1FA98F;
    --mint-soft:#E6F6F2;
    --amber:#E89B3C;
    --amber-soft:#FCF3E6;
    --coral:#E5544E;
    --coral-soft:#FCEBEA;
    --line:rgba(27,42,58,.10);
    --line-soft:rgba(27,42,58,.07);
    --glass-border:rgba(255,255,255,.70);
    --shadow:0 10px 28px rgba(27,42,58,.08);
    --shadow-lg:0 18px 46px rgba(27,42,58,.13);
    --blue-glow:0 0 24px rgba(43,125,233,.22),0 16px 40px rgba(27,42,58,.10);
    --r:24px;
    --r-sm:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:#E8EEF5;min-height:100dvh}
  html,body{-webkit-overflow-scrolling:touch}
  body{
    min-height:100dvh;
    background:
      radial-gradient(circle at 50% -6%, rgba(43,125,233,.22), transparent 34%),
      radial-gradient(circle at 100% 18%, rgba(31,169,143,.10), transparent 26%),
      var(--paper);
    font-family:'IBM Plex Sans Thai','Manrope',-apple-system,sans-serif;
    color:var(--ink);
    display:flex;flex-direction:column;
    overflow-x:hidden;line-height:1.5;
  }
  .num{font-family:'Manrope',sans-serif;font-variant-numeric:tabular-nums}

  header{
    position:sticky;top:0;z-index:50;
    min-height:70px;padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:rgba(244,247,250,.78);
    border-bottom:1px solid rgba(255,255,255,.72);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    box-shadow:0 8px 28px rgba(27,42,58,.05);
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand-mark{
    width:42px;height:42px;border-radius:21px;
    background:linear-gradient(180deg,#2388ff,var(--clinical-deep));
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 0 18px rgba(43,125,233,.35),0 10px 26px rgba(27,42,58,.14);
  }
  .brand-mark svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.25}
  .brand-text{
    font-family:'Manrope';font-weight:800;font-size:18px;letter-spacing:.2px;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .brand-text span{color:var(--clinical)}

  .lang-seg{
    display:flex;gap:3px;padding:4px;border-radius:18px;
    background:rgba(255,255,255,.72);border:1px solid var(--glass-border);
    box-shadow:0 8px 22px rgba(27,42,58,.06);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .lang-seg button{
    height:36px;min-width:42px;border:none;background:transparent;
    font-family:'Manrope';font-weight:800;font-size:13px;color:var(--ink-faint);
    padding:0 9px;border-radius:14px;cursor:pointer;transition:transform .12s,background .15s,color .15s,box-shadow .15s;
  }
  .lang-seg button:active{transform:scale(.96)}
  .lang-seg button.on{
    color:#fff;background:linear-gradient(180deg,#2388ff,var(--clinical-deep));
    box-shadow:0 0 0 1px rgba(73,158,255,.45),0 0 18px rgba(43,125,233,.32);
  }

  .hero{padding:28px 22px 18px;text-align:center}
  .hero-mark{
    width:78px;height:78px;margin:0 auto 18px;border-radius:28px;
    background:linear-gradient(180deg,#2388ff,var(--clinical-deep));
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--blue-glow);
  }
  .hero-mark svg{width:40px;height:40px;stroke:#fff;fill:none;stroke-width:2.1}
  .hero h1{font-size:clamp(27px,7.2vw,36px);font-weight:800;line-height:1.18;letter-spacing:-.6px;margin-bottom:8px;color:var(--ink)}
  .hero p{font-size:15px;color:var(--ink-soft);max-width:320px;margin:0 auto;line-height:1.6;font-weight:600}

  .emergency{
    margin:16px 22px 0;display:flex;align-items:center;gap:12px;
    background:rgba(252,235,234,.78);border:1px solid rgba(229,84,78,.18);
    border-radius:22px;padding:13px 15px;
    box-shadow:0 10px 28px rgba(229,84,78,.07);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .emergency-icon{
    width:46px;height:46px;border-radius:18px;background:var(--coral);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 24px rgba(229,84,78,.22);
  }
  .emergency-icon svg{width:23px;height:23px;stroke:#fff;fill:none;stroke-width:2.35}
  .emergency-text{font-size:13.5px;color:var(--ink);line-height:1.45;font-weight:700}
  .emergency-text b{color:var(--coral);font-weight:800}

  .disclaimer-line{
    text-align:center;font-size:12px;color:var(--ink-faint);font-weight:600;
    margin:11px 24px 0;line-height:1.5;
  }

  .modes{padding:24px 22px 0;display:flex;flex-direction:column;gap:14px}
  .section-eyebrow{
    font-family:'Manrope';font-size:11px;font-weight:800;letter-spacing:1.5px;
    color:var(--ink-faint);text-transform:uppercase;margin-bottom:13px;padding-left:2px;
  }
  .mode{
    width:100%;text-align:left;cursor:pointer;position:relative;overflow:hidden;
    border-radius:26px;padding:18px;
    background:var(--surface);border:1px solid var(--glass-border);
    box-shadow:var(--shadow);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    transition:transform .12s,box-shadow .18s,border-color .18s,background .18s;
  }
  .mode:active{transform:scale(.985);box-shadow:var(--shadow-lg)}
  .mode.primary{
    border-color:rgba(43,125,233,.24);
    box-shadow:var(--blue-glow);
  }
  .mode.primary::before{
    content:'';position:absolute;inset:0 0 auto 0;height:5px;
    background:linear-gradient(90deg,var(--clinical),rgba(31,169,143,.88));
  }
  .mode.primary::after{
    content:'';position:absolute;right:-35px;top:-42px;width:120px;height:120px;border-radius:50%;
    background:rgba(43,125,233,.10);pointer-events:none;
  }
  .mode-head{display:flex;align-items:center;gap:13px;margin-bottom:13px;position:relative;z-index:1}
  .mode-icon{
    width:52px;height:52px;border-radius:21px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    background:rgba(234,242,253,.92);box-shadow:inset 0 0 0 1px rgba(43,125,233,.07);
  }
  .mode-icon svg{width:27px;height:27px;stroke:var(--clinical);fill:none;stroke-width:2.1}
  .mode.alt .mode-icon{background:rgba(248,250,252,.95)}
  .mode.alt .mode-icon svg{stroke:var(--ink-soft)}
  .mode-titles{flex:1;min-width:0}
  .mode-badge{
    display:block;margin-bottom:3px;
    font-family:'Manrope';font-size:10px;font-weight:800;letter-spacing:1.15px;text-transform:uppercase;
    color:var(--clinical);
  }
  .mode.alt .mode-badge{color:var(--ink-faint)}
  .mode-name{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-.1px}
  .mode-arrow{color:var(--ink-faint);flex-shrink:0;transition:transform .2s}
  .mode-arrow svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.2}
  .mode-steps{display:flex;gap:8px;flex-wrap:wrap;position:relative;z-index:1}
  .pill{
    display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    padding:7px 12px;border-radius:20px;background:rgba(248,250,252,.86);
    color:var(--ink-soft);border:1px solid rgba(27,42,58,.07);
  }
  .pill svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2}

  .progress-wrap{padding:20px 22px 0;display:none}
  .progress-wrap.open{display:block}
  .test-row{
    width:100%;cursor:pointer;margin-bottom:10px;padding:14px 16px;
    display:flex;align-items:center;gap:14px;
    background:var(--surface);border:1px solid var(--glass-border);border-radius:22px;
    box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    transition:transform .12s,box-shadow .18s,background .18s,border-color .18s;
  }
  .test-row:active{transform:scale(.99)}
  .test-row.ok{border-color:rgba(31,169,143,.30);background:rgba(230,246,242,.86)}
  .test-row.bad{border-color:rgba(229,84,78,.26);background:rgba(252,235,234,.86)}
  .test-icon{
    width:46px;height:46px;border-radius:18px;background:rgba(248,250,252,.95);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .test-icon svg{width:23px;height:23px;stroke:var(--ink-soft);fill:none;stroke-width:2.1}
  .test-row.ok .test-icon,.test-row.bad .test-icon{background:#fff}
  .test-row.ok .test-icon svg{stroke:var(--mint)}
  .test-row.bad .test-icon svg{stroke:var(--coral)}
  .test-body{flex:1;min-width:0}
  .test-name{font-size:15px;font-weight:800;color:var(--ink)}
  .test-state{font-size:12.5px;color:var(--ink-faint);margin-top:1px;font-weight:700}
  .test-row.ok .test-state{color:var(--mint)}
  .test-row.bad .test-state{color:var(--coral)}
  .test-score{font-family:'Manrope';font-size:15px;font-weight:800;color:var(--ink-faint)}
  .test-row.ok .test-score{color:var(--mint)}
  .test-row.bad .test-score{color:var(--coral)}

  .cta-zone{padding:18px 22px 32px;margin-top:auto}
  .btn-result{
    display:none;width:100%;min-height:62px;border:none;border-radius:24px;
    background:linear-gradient(180deg,#22BA9E,#14896F);color:#fff;
    font-family:'IBM Plex Sans Thai';font-size:18px;font-weight:800;cursor:pointer;
    align-items:center;justify-content:center;gap:9px;
    box-shadow:0 0 24px rgba(31,169,143,.22),0 16px 38px rgba(27,42,58,.12);
    transition:transform .12s;
  }
  .btn-result:active{transform:scale(.985)}
  .btn-result.show{display:flex}
  .btn-result svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.25}
  .btn-clear{
    display:none;width:100%;min-height:46px;border:none;background:transparent;
    color:var(--ink-faint);font-family:'IBM Plex Sans Thai';font-size:13.5px;font-weight:700;cursor:pointer;margin-top:9px;
  }
  .btn-clear.show{display:block}

  @media (min-width:520px){
    body{max-width:430px;margin:0 auto;box-shadow:0 0 0 1px rgba(27,42,58,.06),0 24px 70px rgba(27,42,58,.16)}
  }
  @media (max-height:760px){
    header{min-height:62px;padding:10px 14px}.brand-mark{width:38px;height:38px}.brand-text{font-size:16px}
    .lang-seg button{height:32px;min-width:36px;font-size:12px}
    .hero{padding:20px 20px 12px}.hero-mark{width:64px;height:64px;border-radius:22px;margin-bottom:12px}.hero h1{font-size:25px}.hero p{font-size:13px}
    .emergency{margin-top:12px;padding:11px 13px}.modes{padding-top:18px;gap:11px}.mode{padding:15px;border-radius:22px}.mode-icon{width:46px;height:46px;border-radius:18px}.mode-head{margin-bottom:10px}.cta-zone{padding-bottom:20px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg>
    </div>
    <div class="brand-text">FAST<span>·</span></div>
  </div>
  <div class="lang-seg">
    <button class="on" onclick="setLang('th')">TH</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('ja')">JA</button>
  </div>
</header>

<div class="hero">
  <div class="hero-mark">
    <svg viewBox="0 0 24 24"><path d="M3 12h3.5l1.8-5 3.2 11 2.5-9 1.5 3H21"/></svg>
  </div>
  <h1 data-i="title">รู้ทันสโตรก</h1>
  <p data-i="sub">หน้า · แขน · เสียง<br>ตรวจเบื้องต้นได้เอง</p>
</div>

<div class="emergency">
  <div class="emergency-icon">
    <svg viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
  </div>
  <div class="emergency-text" data-i="emergency">สงสัยสโตรก? โทร <b>1669</b></div>
</div>

<p class="disclaimer-line" data-i="notDiagnosis">ไม่ใช่การวินิจฉัย · ปรึกษาแพทย์เพื่อความแน่ใจ</p>

<div class="modes">
  <button class="mode primary" onclick="startFull()">
    <div class="mode-head">
      <div class="mode-icon">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </div>
      <div class="mode-titles">
        <span class="mode-badge" data-i="fullBadge">ครบ จบที่เดียว</span>
        <div class="mode-name" data-i="fullName">เช็คครบ 3 อย่าง</div>
      </div>
      <span class="mode-arrow"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></span>
    </div>
    <div class="mode-steps">
      <span class="pill"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01M15 9h.01"/></svg><span data-i="face">หน้า</span></span>
      <span class="pill"><svg viewBox="0 0 24 24"><path d="M6 19V9a3 3 0 0 1 6 0v1m0-1a3 3 0 0 1 6 0v10"/></svg><span data-i="arm">แขน</span></span>
      <span class="pill"><svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v3"/></svg><span data-i="speech">เสียง</span></span>
    </div>
  </button>

  <button class="mode alt" onclick="toggleIndividual()">
    <div class="mode-head">
      <div class="mode-icon">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h7M11 4h9a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1h-9M11 4v8M3 18h18"/></svg>
      </div>
      <div class="mode-titles">
        <span class="mode-badge" data-i="indBadge">เลือกเองได้</span>
        <div class="mode-name" data-i="indName">เลือกเช็คทีละอย่าง</div>
      </div>
      <span class="mode-arrow" id="ind-chevron"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></span>
    </div>
  </button>
</div>

<div class="progress-wrap" id="ind-section">
  <button class="test-row" id="row-face" onclick="goTest('face')">
    <div class="test-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01M15 9h.01"/></svg></div>
    <div class="test-body"><div class="test-name" data-i="face">หน้า</div><div class="test-state" id="state-face" data-i="notDone">ยังไม่เช็ค</div></div>
    <div class="test-score" id="score-face">—</div>
  </button>
  <button class="test-row" id="row-arm" onclick="goTest('arm')">
    <div class="test-icon"><svg viewBox="0 0 24 24"><path d="M6 19V9a3 3 0 0 1 6 0v1m0-1a3 3 0 0 1 6 0v10"/></svg></div>
    <div class="test-body"><div class="test-name" data-i="arm">แขน</div><div class="test-state" id="state-arm" data-i="notDone">ยังไม่เช็ค</div></div>
    <div class="test-score" id="score-arm">—</div>
  </button>
  <button class="test-row" id="row-speech" onclick="goTest('speech')">
    <div class="test-icon"><svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v3"/></svg></div>
    <div class="test-body"><div class="test-name" data-i="speech">เสียง</div><div class="test-state" id="state-speech" data-i="notDone">ยังไม่เช็ค</div></div>
    <div class="test-score" id="score-speech">—</div>
  </button>
</div>

<div class="cta-zone">
  <button class="btn-result" id="btn-result" onclick="goResult()">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span data-i="seeResult">ดูผลรวม</span>
  </button>
  <button class="btn-clear" id="btn-clear" onclick="clearAll()" data-i="clearBtn">ล้างผล</button>
</div>

<script>
'use strict';

const I18N = {
  th: {
    title:'รู้ทันสโตรก', sub:'หน้า · แขน · เสียง<br>ตรวจเบื้องต้นได้เอง',
    emergency:'สงสัยสโตรก? โทร <b>1669</b>',
    notDiagnosis:'ไม่ใช่การวินิจฉัย · ปรึกษาแพทย์เพื่อความแน่ใจ',
    fullBadge:'ครบ จบที่เดียว', fullName:'เช็คครบ 3 อย่าง', indBadge:'เลือกเองได้', indName:'เลือกเช็คทีละอย่าง',
    face:'หน้า', arm:'แขน', speech:'เสียง', notDone:'ยังไม่เช็ค',
    ok:'ปกติ', warn:'ต้องระวัง', bad:'ผิดปกติ',
    seeResult:'ดูผลรวม', clearBtn:'ล้างผล',
  },
  en: {
    title:'Beat the Clock', sub:'Face · Arms · Speech<br>a first quick check',
    emergency:'Suspect a stroke? Call <b>emergency</b>',
    notDiagnosis:'Not a diagnosis · See a doctor to be sure',
    fullBadge:'All-in-one', fullName:'Check all 3', indBadge:'Pick & go', indName:'Test one by one',
    face:'Face', arm:'Arms', speech:'Speech', notDone:'Not yet',
    ok:'Normal', warn:'Watch', bad:'Abnormal',
    seeResult:'See result', clearBtn:'Clear',
  },
  ja: {
    title:'脳卒中を<br>見逃さない', sub:'顔・腕・声で<br>まずは簡単チェック',
    emergency:'脳卒中かも? <b>救急</b>へ',
    notDiagnosis:'診断ではありません · 確認は医師へ',
    fullBadge:'まとめて', fullName:'3つを一度に', indBadge:'自由に選択', indName:'1つずつ',
    face:'顔', arm:'腕', speech:'声', notDone:'未チェック',
    ok:'正常', warn:'注意', bad:'異常',
    seeResult:'結果を見る', clearBtn:'クリア',
  },
};

let lang = 'th';
let indOpen = false;

function setLang(l) {
  lang = l;
  const order = ['th','en','ja'];
  document.querySelectorAll('.lang-seg button').forEach((b,i) => b.classList.toggle('on', order[i]===l));
  const T = I18N[l];
  document.querySelectorAll('[data-i]').forEach(el => {
    const k = el.dataset.i;
    if (T[k] !== undefined) el.innerHTML = T[k];
  });
  updateProgress();
  sessionStorage.setItem('fast_lang', l);
}

function startFull() {
  clearAll(true);
  sessionStorage.setItem('fast_mode','full');
  sessionStorage.setItem('fast_lang',lang);
  location.href = 'face-test.html';
}

function toggleIndividual() {
  indOpen = !indOpen;
  document.getElementById('ind-section').classList.toggle('open', indOpen);
  const chev = document.getElementById('ind-chevron');
  chev.style.transform = indOpen ? 'rotate(90deg)' : '';
  chev.style.transition = 'transform 0.2s';
  if (indOpen) updateProgress();
}

function goTest(m) {
  sessionStorage.setItem('fast_mode','individual');
  sessionStorage.setItem('fast_lang',lang);
  location.href = m + '-test.html';
}

function goResult() { location.href = 'result.html'; }

function updateProgress() {
  const T = I18N[lang];
  let done = 0;
  ['face','arm','speech'].forEach(m => {
    const raw = sessionStorage.getItem('fast_'+m);
    const row = document.getElementById('row-'+m);
    const state = document.getElementById('state-'+m);
    const score = document.getElementById('score-'+m);
    if (!raw) {
      row.className = 'test-row';
      state.textContent = T.notDone;
      score.textContent = '—';
      return;
    }
    done++;
    const d = JSON.parse(raw);
    const ok = d.riskLevel === 'ok' || d.passed === true;
    row.className = 'test-row ' + (ok ? 'ok' : 'bad');
    state.textContent = ok ? T.ok : T.bad;
    score.textContent = d.score !== undefined ? d.score : '✓';
  });
  document.getElementById('btn-result').classList.toggle('show', done === 3);
  document.getElementById('btn-clear').classList.toggle('show', done > 0);
}

function clearAll(silent) {
  ['fast_face','fast_arm','fast_speech','fast_mode'].forEach(k => sessionStorage.removeItem(k));
  if (!silent) updateProgress();
}

setLang(sessionStorage.getItem('fast_lang') || 'th');
updateProgress();
</script>
