<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FAST · ผลการทดสอบ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap');
  :root {
    --bg:#0A0E14; --surface:#131820; --surface2:#1C2330;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
    --blue:#3B82F6; --green:#10B981; --red:#EF4444; --amber:#F59E0B;
    --text:#F1F5F9; --muted:rgba(241,245,249,0.45);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);font-family:'DM Sans',-apple-system,sans-serif;color:var(--text);
    min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}

  header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;
    letter-spacing:2px;padding:4px 8px;border-radius:6px}
  .back-btn{background:none;border:1.5px solid var(--border);border-radius:8px;
    color:var(--muted);font-size:13px;font-weight:500;padding:6px 12px;cursor:pointer;font-family:inherit}

  /* ── Score Hero ── */
  .score-hero{padding:28px 24px 20px;text-align:center}
  .score-eyebrow{font-size:11px;font-weight:600;letter-spacing:3px;color:var(--muted);
    text-transform:uppercase;margin-bottom:16px}
  .score-ring{width:140px;height:140px;margin:0 auto 16px;position:relative}
  .score-ring svg{transform:rotate(-90deg)}
  .ring-track{fill:none;stroke:var(--surface2);stroke-width:10}
  .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;
    stroke-dasharray:376;stroke-dashoffset:376;transition:stroke-dashoffset 1.2s ease}
  .score-center{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px}
  .score-num{font-family:'DM Mono',monospace;font-size:36px;font-weight:500}
  .score-denom{font-size:12px;color:var(--muted)}
  .risk-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;
    border-radius:20px;font-size:13px;font-weight:600;margin-bottom:8px}
  .risk-badge.ok{background:rgba(16,185,129,0.12);color:var(--green)}
  .risk-badge.warn{background:rgba(245,158,11,0.12);color:var(--amber)}
  .risk-badge.bad{background:rgba(239,68,68,0.12);color:var(--red)}
  .risk-desc{font-size:13px;color:var(--muted);line-height:1.6;max-width:280px;margin:0 auto}

  /* ── Module breakdown ── */
  .section{padding:0 24px 20px}
  .section-title{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--muted);
    text-transform:uppercase;margin-bottom:12px}
  .module-cards{display:flex;flex-direction:column;gap:8px}
  .mcard{background:var(--surface);border:1.5px solid var(--border);
    border-radius:14px;padding:14px 16px}
  .mcard.ok{border-color:rgba(16,185,129,0.3)}
  .mcard.warn{border-color:rgba(245,158,11,0.3)}
  .mcard.bad{border-color:rgba(239,68,68,0.3)}
  .mcard-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .mcard-icon{font-size:22px;width:40px;height:40px;background:var(--surface2);
    border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mcard.ok .mcard-icon{background:rgba(16,185,129,0.1)}
  .mcard.warn .mcard-icon{background:rgba(245,158,11,0.1)}
  .mcard.bad .mcard-icon{background:rgba(239,68,68,0.1)}
  .mcard-name{font-size:13px;font-weight:600;margin-bottom:2px}
  .mcard-status{font-size:12px}
  .mcard.ok .mcard-status{color:var(--green)}
  .mcard.warn .mcard-status{color:var(--amber)}
  .mcard.bad .mcard-status{color:var(--red)}
  .mcard-score-row{display:flex;align-items:center;gap:8px}
  .mcard-bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
  .mcard-bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
  .mcard.ok .mcard-bar-fill{background:var(--green)}
  .mcard.warn .mcard-bar-fill{background:var(--amber)}
  .mcard.bad .mcard-bar-fill{background:var(--red)}
  .mcard-score-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);
    width:40px;text-align:right;flex-shrink:0}

  /* ── Emergency box ── */
  .emergency-box{margin:0 24px 20px;background:rgba(239,68,68,0.08);
    border:1.5px solid rgba(239,68,68,0.3);border-radius:14px;padding:16px;
    display:none;text-align:center}
  .emergency-box.visible{display:block}
  .emg-title{font-size:15px;font-weight:700;color:var(--red);margin-bottom:6px}
  .emg-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px}
  .emg-call{display:block;background:var(--red);color:#fff;border:none;
    border-radius:10px;padding:12px;font-size:16px;font-weight:700;
    cursor:pointer;font-family:inherit;width:100%}

  /* ── Suggestion box ── */
  .suggest-box{margin:0 24px 20px;background:var(--surface);border:1.5px solid var(--border);
    border-radius:14px;padding:16px}
  .suggest-title{font-size:13px;font-weight:600;margin-bottom:8px}
  .suggest-list{list-style:none;display:flex;flex-direction:column;gap:6px}
  .suggest-list li{font-size:13px;color:var(--muted);line-height:1.5;
    padding-left:16px;position:relative}
  .suggest-list li::before{content:'·';position:absolute;left:4px;color:var(--muted)}

  /* ── Action buttons ── */
  .actions{padding:0 24px 32px;display:flex;flex-direction:column;gap:10px}
  .btn-primary{min-height:56px;border-radius:14px;border:none;background:var(--blue);
    color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-secondary{min-height:48px;border-radius:12px;border:1.5px solid var(--border);
    background:none;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">FAST</span>
  </div>
  <button class="back-btn" onclick="history.back()">← กลับ</button>
</header>

<div class="score-hero">
  <div class="score-eyebrow" id="eyebrow">ผลการทดสอบ FAST</div>
  <div class="score-ring">
    <svg width="140" height="140" viewBox="0 0 140 140">
      <circle class="ring-track" cx="70" cy="70" r="60"/>
      <circle class="ring-fill" id="ring-fill" cx="70" cy="70" r="60"/>
    </svg>
    <div class="score-center">
      <div class="score-num" id="total-score">—</div>
      <div class="score-denom">/100</div>
    </div>
  </div>
  <div class="risk-badge" id="risk-badge">—</div>
  <div class="risk-desc" id="risk-desc"></div>
</div>

<div class="section">
  <div class="section-title" id="breakdown-title">ผลแต่ละการทดสอบ</div>
  <div class="module-cards" id="module-cards"></div>
</div>

<div class="emergency-box" id="emergency-box">
  <div class="emg-title">⚠️ แนะนำพบแพทย์ทันที</div>
  <div class="emg-sub" id="emg-sub">พบความผิดปกติของการพูดและ/หรือร่างกาย กรุณาติดต่อแพทย์หรือโทรสายฉุกเฉินทันที</div>
  <button class="emg-call" onclick="window.location.href='tel:1669'">📞 โทร 1669</button>
</div>

<div class="suggest-box" id="suggest-box">
  <div class="suggest-title" id="suggest-title">คำแนะนำ</div>
  <ul class="suggest-list" id="suggest-list"></ul>
</div>

<div class="actions">
  <button class="btn-primary" id="retry-btn" onclick="retryAll()">ทดสอบใหม่อีกครั้ง</button>
  <button class="btn-secondary" onclick="window.location.href='index.html'">กลับหน้าหลัก</button>
</div>

<script>
'use strict';

const lang = sessionStorage.getItem('fast_lang') || 'th';

// weights ตาม FAST clinical importance
// น้ำหนักตามหลักฐานงานวิจัย: face และ arm เป็นตัวทำนาย stroke อิสระ
// (Santa Clara study, n=359) จึงให้น้ำหนักสูงกว่า speech
const WEIGHTS = { face: 0.40, arm: 0.40, speech: 0.20 };

const LABELS = {
  th: {
    face: 'ใบหน้า', arm: 'แขน', speech: 'การพูด',
    ok: 'ปกติ', warn: 'เฝ้าระวัง', bad: 'ความเสี่ยงสูง',
    riskOk: 'ผลการทดสอบปกติ',
    riskWarn: 'พบความผิดปกติเล็กน้อย',
    riskBad: 'ความเสี่ยงสูง — ควรพบแพทย์',
    descOk: 'ไม่พบความผิดปกติที่ชัดเจน ควรทดสอบซ้ำเป็นระยะ หากมีอาการผิดปกติให้รีบพบแพทย์',
    descWarn: 'พบความผิดปกติบางส่วน ควรพบแพทย์เพื่อประเมินเพิ่มเติม',
    descBad: 'พบความผิดปกติหลายจุด กรุณาพบแพทย์หรือโทร 1669 ทันที',
    suggestOk: ['ทดสอบซ้ำทุก 3-6 เดือน', 'ดูแลสุขภาพหัวใจและหลอดเลือด', 'หากมีอาการผิดปกติกะทันหัน ให้รีบพบแพทย์'],
    suggestWarn: ['พบแพทย์เพื่อประเมินเพิ่มเติม', 'บันทึกอาการและเวลาที่เกิด', 'หากอาการแย่ลง โทร 1669 ทันที'],
    suggestBad: ['โทร 1669 หรือไปห้องฉุกเฉินทันที', 'อย่าขับรถหรือเดินทางคนเดียว', 'เวลาสำคัญมาก — รักษาภายใน 4.5 ชั่วโมง'],
    retryAll: 'ทดสอบใหม่ทั้งหมด',
    notTested: 'ไม่ได้ทดสอบ',
    overrideNote: 'แม้คะแนนรวมจะไม่ต่ำมาก แต่พบความผิดปกติชัดเจนที่: {modules} ซึ่งเพียงอาการเดียวก็บ่งชี้ความเสี่ยง stroke ได้ ควรพบแพทย์',
  },
  en: {
    face: 'Face', arm: 'Arms', speech: 'Speech',
    ok: 'Normal', warn: 'Watch', bad: 'High Risk',
    riskOk: 'Results look normal',
    riskWarn: 'Minor abnormality detected',
    riskBad: 'High risk — see a doctor',
    descOk: 'No clear abnormalities detected. Continue monitoring and see a doctor if symptoms appear.',
    descWarn: 'Some abnormalities found. See a doctor for further evaluation.',
    descBad: 'Multiple abnormalities found. Call emergency services or go to an ER immediately.',
    suggestOk: ['Retest every 3-6 months', 'Maintain cardiovascular health', 'Seek care immediately if sudden symptoms appear'],
    suggestWarn: ['See a doctor for further evaluation', 'Record symptoms and timing', 'Call emergency services if symptoms worsen'],
    suggestBad: ['Call emergency services immediately', "Don't drive or travel alone", 'Time is critical — treatment within 4.5 hours'],
    retryAll: 'Test Again',
    notTested: 'Not tested',
    overrideNote: 'Although the overall score is not low, a clear abnormality was found in: {modules}. A single positive sign alone can indicate stroke risk — see a doctor.',
  },
};

const T = LABELS[lang];
const ICONS = { face: '😊', arm: '💪', speech: '🗣️' };

function getRiskClass(score) {
  if (score >= 70) return 'ok';
  if (score >= 45) return 'warn';
  return 'bad';
}

function buildResult() {
  const data = {
    face:   JSON.parse(sessionStorage.getItem('fast_face')   || 'null'),
    arm:    JSON.parse(sessionStorage.getItem('fast_arm')    || 'null'),
    speech: JSON.parse(sessionStorage.getItem('fast_speech') || 'null'),
  };

  // คำนวณ weighted FAST score
  let totalWeight = 0, weightedSum = 0;
  ['face', 'arm', 'speech'].forEach(m => {
    if (data[m] && data[m].score !== undefined) {
      weightedSum += data[m].score * WEIGHTS[m];
      totalWeight += WEIGHTS[m];
    }
  });
  const fastScore = totalWeight > 0 ? Math.round(weightedSum / totalWeight) : 0;

  // ── Single-positive override (หลัก CPSS) ──────────────────────────
  // ถ้า module ใดได้ "bad" แม้แต่อันเดียว → flag เสี่ยงสูงทันที
  // ไม่ว่าค่าเฉลี่ยถ่วงน้ำหนักจะเป็นเท่าไหร่
  // เพราะการพบอาการเดียวก็บ่งชี้ stroke ได้ (ป้องกัน false negative)
  let anyBad = false;
  let badModules = [];
  ['face', 'arm', 'speech'].forEach(m => {
    if (data[m] && data[m].score !== undefined && getRiskClass(data[m].score) === 'bad') {
      anyBad = true;
      badModules.push(m);
    }
  });

  // riskClass ตัดสินจาก override ก่อน แล้วค่อยดู weighted score
  let riskClass;
  if (anyBad) {
    riskClass = 'bad';
  } else {
    riskClass = getRiskClass(fastScore);
  }

  // ── Score ring ──
  const circumference = 376;
  const offset = circumference - (fastScore / 100) * circumference;
  const ringColors = { ok: '#10B981', warn: '#F59E0B', bad: '#EF4444' };
  const fill = document.getElementById('ring-fill');
  fill.style.stroke = ringColors[riskClass];
  setTimeout(() => { fill.style.strokeDashoffset = offset; }, 100);
  document.getElementById('total-score').textContent = fastScore;
  document.getElementById('total-score').style.color = ringColors[riskClass];

  // ── Risk badge ──
  const badge = document.getElementById('risk-badge');
  badge.className = 'risk-badge ' + riskClass;
  badge.textContent = { ok: '✅ ' + T.riskOk, warn: '⚠️ ' + T.riskWarn, bad: '🚨 ' + T.riskBad }[riskClass];
  document.getElementById('risk-desc').textContent = T['desc' + riskClass.charAt(0).toUpperCase() + riskClass.slice(1)];

  // ถ้าเกิดจาก single-positive override ทั้งที่ค่าเฉลี่ยไม่ต่ำ ให้อธิบายเพิ่ม
  if (anyBad && fastScore >= 45) {
    const moduleNames = badModules.map(m => T[m]).join(', ');
    document.getElementById('risk-desc').textContent = T.overrideNote.replace('{modules}', moduleNames);
  }

  // ── Module cards ──
  const container = document.getElementById('module-cards');
  container.innerHTML = '';
  ['face', 'arm', 'speech'].forEach(m => {
    const d = data[m];
    const score = d?.score ?? null;
    const cls = score !== null ? getRiskClass(score) : 'warn';
    const card = document.createElement('div');
    card.className = 'mcard ' + cls;
    const statusText = score !== null
      ? { ok: T.ok, warn: T.warn, bad: T.bad }[cls]
      : T.notTested;
    card.innerHTML = `
      <div class="mcard-top">
        <div class="mcard-icon">${ICONS[m]}</div>
        <div>
          <div class="mcard-name">${T[m]}</div>
          <div class="mcard-status">${statusText}</div>
        </div>
      </div>
      <div class="mcard-score-row">
        <div class="mcard-bar-track">
          <div class="mcard-bar-fill" style="width:0%" data-target="${score ?? 0}"></div>
        </div>
        <div class="mcard-score-num">${score !== null ? score + '/100' : '—'}</div>
      </div>`;
    container.appendChild(card);
  });
  // animate bars
  setTimeout(() => {
    document.querySelectorAll('.mcard-bar-fill').forEach(el => {
      el.style.width = el.dataset.target + '%';
    });
  }, 200);

  // ── Emergency box ──
  if (riskClass === 'bad') {
    document.getElementById('emergency-box').classList.add('visible');
  }

  // ── Suggestions ──
  const suggestions = T['suggest' + riskClass.charAt(0).toUpperCase() + riskClass.slice(1)];
  const list = document.getElementById('suggest-list');
  list.innerHTML = suggestions.map(s => `<li>${s}</li>`).join('');

  // ── Retry button ──
  document.getElementById('retry-btn').textContent = T.retryAll;
}

function retryAll() {
  ['fast_face', 'fast_arm', 'fast_speech'].forEach(k => sessionStorage.removeItem(k));
  window.location.href = 'index.html';
}

buildResult();
</script>
</body>
</html>
