<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FAST · Speech Test (Trailing Silence V3)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');
  :root {
    --bg:#F7F9FC; /* ขาวนวล สบายตาแบบ Clinical Clean */
    --surface:#FFFFFF; --surface-alt:#F1F3F7; --border:#DDE3EA;
    --blue:#2B7DE9; --green:#16A34A; --red:#DC2626; --amber:#D97706;
    --text:#1E293B; --muted:#64748B; --muted2:#94A3B8;
    --shadow:0 4px 6px -1px rgba(0,0,0,0.05), 0 10px 15px -3px rgba(0,0,0,0.03);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);font-family:'IBM Plex Sans Thai','Manrope',-apple-system,sans-serif;color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-overflow-scrolling:touch}
  .num{font-family:'Manrope';font-variant-numeric:tabular-nums}

  #lang-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px 28px}
  .title-lbl{font-size:12px;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
  .main-title{font-size:26px;font-weight:700;text-align:center;color:var(--text)}
  .lang-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
  .lang-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;width:100%;color:var(--text);box-shadow:var(--shadow);transition:transform 0.12s, border-color 0.2s}
  .lang-btn:active{transform:scale(0.98);border-color:var(--blue);background:rgba(43,125,233,0.05)}
  .lang-flag{font-size:26px}.lang-text{font-size:15px;font-weight:600}

  #test-screen{flex:1;display:none;flex-direction:column;height:100%;overflow:hidden}
  #top-bar{padding:16px 22px 0;display:flex;align-items:center;justify-content:space-between}
  .nav-btn{background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:8px}
  
  #mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px 24px;gap:14px;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%}

  .mic-box{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mic-circle{width:100px;height:100px;border-radius:50%;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;transition:all 0.3s;box-shadow:var(--shadow)}
  .mic-circle.calibrating{border-color:var(--amber);background:rgba(217,119,6,0.08)}
  .mic-circle.recording{border-color:var(--red);background:rgba(220,38,38,0.08);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .mic-icon{font-size:38px}
  #freq-canvas{position:absolute;inset:0;width:120px;height:120px;border-radius:50%;pointer-events:none;transform:rotate(-90deg)}

  .word-display{font-size:34px;font-weight:800;text-align:center;letter-spacing:-0.5px;color:var(--text);margin:6px 0}
  .hint-lbl{font-size:15px;color:var(--muted);text-align:center;max-width:290px;line-height:1.6;font-weight:500}
  
  #transcript-box{font-family:'IBM Plex Sans Thai', sans-serif;font-size:15px;font-weight:600;color:#1E3A8A;background:rgba(43,125,233,0.08);border:1px solid rgba(43,125,233,0.15);padding:10px 18px;border-radius:12px;display:none;text-align:center;width:100%;max-width:280px;box-shadow:inset 0 1px 2px rgba(0,0,0,0.02)}

  /* ── ปรับปรุง CSS ส่วนพับเก็บเพื่อให้รองรับ iOS / Safari แบบ 100% ── */
  #details-collapse {
    display: none; /* ใช้ display ซ่อนแทนเพื่อหลีกเลี่ยงบั๊กบนโทรศัพท์ */
    width: 100%;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
    margin-bottom: 10px;
  }
  #details-collapse.expanded {
    display: flex !important; /* บังคับแสดงผลเป็นกล่อง */
  }

  #metrics-box{width:100%;max-width:280px;display:flex;flex-direction:column;gap:12px;background:var(--surface);padding:14px;border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow)}
  .metric-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-weight:700}
  .metric-val{font-family:'Manrope',monospace;font-size:14px;font-weight:700;color:var(--text)}
  .bar-track{height:8px;background:var(--surface-alt);border-radius:5px;overflow:hidden;margin-top:4px}
  .bar-fill{height:100%;width:0%;border-radius:4px;transition:width 0.3s}

  #result-banner {
    display: none; width: 100%; max-width: 280px;
    border-radius: 16px; padding: 16px;
    flex-direction: column; gap: 4px;
    box-shadow: var(--shadow);
    text-align: center;
    position: relative;
  }
  #result-banner.ok { background: #DCFCE7; border: 1.5px solid #BBF7D0; }
  #result-banner.warn { background: #FEF3C7; border: 1.5px solid #FDE68A; }
  #result-banner.bad { background: #FEE2E2; border: 1.5px solid #FCA5A5; }
  
  .rb-title { font-size: 18px; font-weight: 800; }
  .rb-score { font-family: 'Manrope', monospace; font-size: 44px; font-weight: 800; margin: 2px 0; letter-spacing: -1px; }
  .rb-sub { font-size: 13px; font-weight: 600; line-height: 1.5; color: #334155 !important; margin-bottom: 8px; }

  /* ปุ่มกดสำหรับเปิดดูรายละเอียดเพิ่มเติม */
  #toggle-details-btn {
    background: rgba(0,0,0,0.05);
    border: none;
    border-radius: 8px;
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 14px;
    cursor: pointer;
    align-self: center;
    margin-top: 4px;
    transition: background 0.2s, color 0.2s;
  }
  #toggle-details-btn:active { background: rgba(0,0,0,0.12); }

  #debug-box{display:block; width:100%;max-width:280px;background:#E2E8F0;border:1px solid #CBD5E1;border-radius:10px;padding:12px 14px;font-family:monospace;font-size:11px;color:#334155;line-height:1.8;box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);}

  /* ส่วนควบคุมปุ่มกดด้านล่าง */
  #controls-area {
    width: 100%;
    padding: 0 22px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }
  #action-btn{width:100%;min-height:56px;border-radius:15px;border:none;font-family:'IBM Plex Sans Thai';font-size:17px;font-weight:700;cursor:pointer;color:#fff;background:var(--blue);box-shadow:0 6px 18px rgba(43,125,233,0.25);transition:transform 0.12s, opacity 0.2s}
  #action-btn:active{transform:scale(0.97);opacity:0.9}
  #action-btn.red{background:var(--red);box-shadow:0 6px 18px rgba(220,38,38,0.25)}
  #action-btn.green{background:var(--green);box-shadow:0 6px 18px rgba(22,163,74,0.25)}

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="lang-screen">
  <span class="title-lbl">🗣️ FAST · Speech Test</span>
  <div class="main-title">Select Language</div>
  <div class="lang-btns">
    <button class="lang-btn" onclick="selectLang('th')"><span class="lang-flag">🇹🇭</span><span class="lang-text">ภาษาไทย</span></button>
    <button class="lang-btn" onclick="selectLang('en')"><span class="lang-flag">🇬🇧</span><span class="lang-text">English</span></button>
    <button class="lang-btn" onclick="selectLang('ja')"><span class="lang-flag">🇯🇵</span><span class="lang-text">日本語</span></button>
  </div>
</div>

<div id="test-screen">
  <div id="top-bar">
    <span class="title-lbl">Speech Test</span>
    <button class="nav-btn" onclick="goBack()">🌐 Language</button>
  </div>
  <div id="mid">
    <div class="mic-box">
      <canvas id="freq-canvas" width="120" height="120"></canvas>
      <div class="mic-circle" id="mic-circle"><span class="mic-icon" id="mic-icon">🎤</span></div>
    </div>
    <p class="hint-lbl" id="hint-text"></p>
    <h1 class="word-display" id="word-target"></h1>
    <div id="transcript-box"></div>
    
    <div id="result-banner">
      <div class="rb-title" id="rb-title"></div>
      <div class="rb-score" id="rb-score"></div>
      <div class="rb-sub"  id="rb-sub"></div>
      <button id="toggle-details-btn" onclick="toggleDetails()">ดูรายละเอียดเพิ่มเติม ▾</button>
    </div>

    <div id="details-collapse">
      <div id="metrics-box">
        <div>
          <div class="metric-row"><span>Word Accuracy</span><span class="metric-val" id="val-word">—</span></div>
          <div class="bar-track"><div class="bar-fill" id="bar-word"></div></div>
          <div style="text-align:right;font-family:monospace;font-size:11px;color:var(--muted);margin-top:2px" id="score-word"></div>
        </div>
        <div>
          <div class="metric-row"><span>Speech Rate</span><span class="metric-val" id="val-rate">—</span></div>
          <div class="bar-track"><div class="bar-fill" id="bar-rate"></div></div>
          <div style="text-align:right;font-family:monospace;font-size:11px;color:var(--muted);margin-top:2px" id="score-rate"></div>
        </div>
        <div>
          <div class="metric-row"><span>Volume Stability</span><span class="metric-val" id="val-stab">—</span></div>
          <div class="bar-track"><div class="bar-fill" id="bar-stab"></div></div>
          <div style="text-align:right;font-family:monospace;font-size:11px;color:var(--muted);margin-top:2px" id="score-stab"></div>
        </div>
      </div>
      <div id="debug-box"></div>
    </div>
  </div>

  <div id="controls-area">
    <button id="action-btn" onclick="handleAction()"></button>
  </div>
</div>

<script src="fast-permissions.js"></script>
<script>
'use strict';

const CONFIG = {
  th: {
    langCode: 'th-TH',
    target: 'วันนี้อากาศดี',
    syllables: 5,
    keywords: ['วันนี้อากาศดี', 'อากาศดี', 'วันนี้'],
    hint: 'กดปุ่ม รอสัญญาณ แล้วพูดประโยคนี้ให้ชัดเจน',
    btnStart: 'เริ่มพูด', btnRetry: 'ทดสอบอีกครั้ง',
    showMore: 'ดูรายละเอียดเพิ่มเติม ▾', hideMore: 'ซ่อนรายละเอียด ▴'
  },
  en: {
    langCode: 'en-US',
    target: 'Today is a sunny day',
    syllables: 6,
    keywords: ['today is a sunny day', 'sunny day', 'today is sunny'],
    hint: 'Press the button, wait for the signal, then speak clearly.',
    btnStart: 'Start Speaking', btnRetry: 'Test Again',
    showMore: 'View Details ▾', hideMore: 'Hide Details ▴'
  },
  ja: {
    langCode: 'ja-JP',
    target: '今日はいい天気です',
    syllables: 8,
    keywords: ['今日はいい天気です', 'いい天気', '今日はいい天気'],
    hint: 'ボタンを押して、合図を待ってから、はっきり話してください。',
    btnStart: '発言する', btnRetry: '再テスト',
    showMore: '詳細を表示 ▾', hideMore: '詳細を閉じる ▴'
  },
};

const CALIBRATION_MS   = 300;
const NOISE_MULTIPLIER = 2.5;
const NOISE_FLOOR_CAP  = 0.08;
const NORMAL_MIN       = 2.5;
const NORMAL_MAX       = 6.0;

const $ = id => document.getElementById(id);
let T = null;
let phase = 'IDLE';

let audioCtx = null, analyser = null, source = null, streamRef = null;
let animationFrameId = null;
let recognition = null;

let noiseFloor     = 0;      
let noiseFrames    = [];     
let calibStartMs   = null;
let dynThreshold   = 0.04;   

let vowelEnergyBuf = [];
let voiceHistory   = [];
let speechStartMs  = null;
let speechEndMs    = null;
let lastVoiceMs    = null;

function selectLang(code) {
  T = CONFIG[code];
  $('lang-screen').style.display = 'none';
  $('test-screen').style.display = 'flex';
  $('word-target').textContent   = T.target;
  $('hint-text').textContent     = T.hint;
  $('action-btn').textContent    = T.btnStart;
  resetUI();
}

function goBack() {
  stopAll();
  phase = 'IDLE';
  $('test-screen').style.display = 'none';
  $('lang-screen').style.display = 'flex';
}

function resetUI() {
  $('mic-circle').className        = 'mic-circle';
  $('mic-icon').textContent        = '🎤';
  $('transcript-box').style.display = 'none';
  $('transcript-box').textContent  = '';
  $('result-banner').style.display = 'none';
  $('details-collapse').classList.remove('expanded');
  $('action-btn').className        = '';
  $('action-btn').textContent      = T ? T.btnStart : '';
  
  const oldNav = $('fast-nav-btn');
  if (oldNav) oldNav.remove();

  ['word','rate','stab'].forEach(k => {
    $('bar-'+k).style.width      = '0%';
    $('bar-'+k).style.background = 'var(--blue)';
    $('val-'+k).textContent      = '—';
  });
  $('freq-canvas').getContext('2d').clearRect(0,0,120,120);
  
  noiseFloor = 0; noiseFrames = []; calibStartMs = null; dynThreshold = 0.04;
  vowelEnergyBuf = []; voiceHistory = []; speechStartMs = null; speechEndMs = null; lastVoiceMs = null;
}

function toggleDetails() {
  const area = $('details-collapse');
  const btn = $('toggle-details-btn');
  const isExpanded = area.classList.toggle('expanded');
  btn.textContent = isExpanded ? T.hideMore : T.showMore;
  
  if (isExpanded) {
    setTimeout(() => {
      area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 800);
  }
}

// ── แก้ไขจุดนี้: ทำการสร้าง AudioContext ทันทีที่ผู้ใช้คลิกปุ่ม ป้องกัน Apple iOS บล็อกไมค์ ──
function handleAction() {
  // บังคับเริ่มสร้าง AudioContext ทันทีที่กดสัมผัสหน้าจอตามกฎความปลอดภัยของ iOS
  if (!audioCtx && (phase === 'IDLE' || phase === 'DONE')) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { console.error("AudioContext not supported", e); }
  } else if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  if      (phase === 'IDLE')      startRecording();
  else if (phase === 'RECORDING') {
    speechEndMs = getLastSpeechSegmentEnd();
    evaluateSpeech('__manual__', 0);
  }
  else if (phase === 'DONE')      { phase = 'IDLE'; resetUI(); }
}

function setBar(key, pct, label) {
  const p = Math.min(Math.max(pct, 0), 100);
  $('bar-'+key).style.width      = p + '%';
  $('bar-'+key).style.background = p >= 65 ? 'var(--green)' : p >= 35 ? 'var(--amber)' : 'var(--red)';
  $('val-'+key).textContent      = label;
  const scoreEl = $('score-'+key);
  if (scoreEl) scoreEl.textContent = pct > 0 ? `score: ${Math.round(p)}` : '';
}

async function startRecording() {
  phase = 'CALIBRATING';
  $('mic-circle').className        = 'mic-circle calibrating';
  $('mic-icon').textContent        = '🔇';
  $('action-btn').textContent      = '... กำลังปรับค่า ...';
  $('action-btn').className        = '';
  $('transcript-box').style.display = 'block';
  $('transcript-box').textContent  = '🔇 วัดเสียงรบกวนรอบห้อง...';
  $('debug-box').textContent       = 'calibrating noise floor...';

  try {
    const permLang = sessionStorage.getItem('fast_lang') || 'th';
    const perm = await FastPermissions.request('mic', permLang);
    if (!perm.ok) {
      FastPermissions.requestWithUI('mic', permLang, (stream) => {
        streamRef = stream;
        location.reload();
      });
      phase = 'IDLE';
      return;
    }
    streamRef = perm.stream;
    
    // ตรวจสอบให้แน่ใจว่าได้สร้าง context ครบถ้วน
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize               = 1024;
    analyser.smoothingTimeConstant = 0.2; 
    source    = audioCtx.createMediaStreamSource(streamRef);
    source.connect(analyser);
    calibStartMs = performance.now();
    runLoop();
  } catch (err) {
    $('transcript-box').textContent = '⚠️ ไม่สามารถเข้าถึงไมค์: ' + err.message;
    phase = 'IDLE';
    $('action-btn').textContent = T.btnStart;
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    recognition = new SR();
    recognition.lang           = T.langCode;
    recognition.continuous     = true;
    recognition.interimResults = false;
    let gotResult = false;
    
    recognition.onresult = (e) => {
      gotResult = true;
      speechEndMs = getLastSpeechSegmentEnd();
      const text = e.results[0][0].transcript.toLowerCase().trim();
      const conf = e.results[0][0].confidence;
      setTimeout(() => evaluateSpeech(text, conf), 100);
    };

    recognition.onerror = (e) => {
      if ((phase === 'RECORDING' || phase === 'CALIBRATING') && !gotResult) {
        speechEndMs = getLastSpeechSegmentEnd();
        setTimeout(() => evaluateSpeech('', 0), 100);
      }
    };

    recognition.onend = () => {
      if ((phase === 'RECORDING' || phase === 'CALIBRATING') && !gotResult) {
        speechEndMs = getLastSpeechSegmentEnd();
        setTimeout(() => { if (phase !== 'DONE') evaluateSpeech('', 0); }, 100);
      }
    };

    recognition.start();
  } else {
    setTimeout(() => {
      if (phase !== 'DONE') {
        speechEndMs = getLastSpeechSegmentEnd();
        evaluateSpeech('__no_api__', 1.0);
      }
    }, 8000);
  }
}

function stopAll() {
  if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
  if (recognition)  { try { recognition.abort(); } catch(e){} recognition = null; }
  if (source)       { try { source.disconnect(); } catch(e){} source = null; }
  if (streamRef)    { streamRef.getTracks().forEach(t => t.stop()); streamRef = null; }
  if (audioCtx)     { try { audioCtx.close(); } catch(e){} audioCtx = null; }
  analyser = null;
}

function runLoop() {
  if ((phase !== 'CALIBRATING' && phase !== 'RECORDING') || !analyser) return;

  const N       = analyser.frequencyBinCount;
  const freqArr = new Uint8Array(N);
  analyser.getByteFrequencyData(freqArr);

  const sr     = audioCtx.sampleRate;
  const binHz  = sr / analyser.fftSize;
  const loIdx  = Math.round(300  / binHz);
  const hiIdx  = Math.round(2000 / binHz);

  let eSum = 0;
  for (let i = loIdx; i <= hiIdx; i++) eSum += freqArr[i];
  const vEnergy = eSum / ((hiIdx - loIdx + 1) * 255);

  const nowMs = performance.now();

  if (phase === 'CALIBRATING') {
    noiseFrames.push(vEnergy);
    const elapsed = nowMs - calibStartMs;
    $('debug-box').innerHTML = `calibrating noise... ${Math.round(elapsed)}ms<br>vEnergy: ${vEnergy.toFixed(5)}`;

    if (elapsed >= CALIBRATION_MS) {
      const avg = noiseFrames.reduce((a,b)=>a+b,0) / noiseFrames.length;
      const std = Math.sqrt(noiseFrames.reduce((a,b)=>a+(b-avg)**2,0) / noiseFrames.length);
      
      noiseFloor   = Math.min(avg + std, NOISE_FLOOR_CAP);
      dynThreshold = noiseFloor * NOISE_MULTIPLIER;

      phase = 'RECORDING';
      $('mic-circle').className       = 'mic-circle recording';
      $('mic-icon').textContent       = '👄';
      $('action-btn').textContent     = '⏹ หยุด';
      $('action-btn').className       = 'red';
      $('transcript-box').textContent = '... กำลังฟังคำพูด ...';
    }

    drawWave(freqArr, N);
    animationFrameId = requestAnimationFrame(runLoop);
    return;
  }

  const isVoice = vEnergy > dynThreshold;

  if (isVoice) {
    if (!speechStartMs) speechStartMs = nowMs;
    lastVoiceMs = nowMs;
    voiceHistory.push({ time: nowMs, energy: vEnergy });
    vowelEnergyBuf.push(vEnergy);
    if (vowelEnergyBuf.length > 500) vowelEnergyBuf.shift();
  }

  while (voiceHistory.length && (nowMs - voiceHistory[0].time > 5000)) {
    voiceHistory.shift();
  }

  const previewEnd = lastVoiceMs ? lastVoiceMs : nowMs;
  const durSec = speechStartMs ? (previewEnd - speechStartMs) / 1000 : 0;
  if (durSec > 0.3) {
    const rate = T.syllables / durSec;
    setBar('rate', rateToScore(rate), `${rate.toFixed(1)} syl/s`);
  }
  if (vowelEnergyBuf.length > 10) {
    const s = calcStab(vowelEnergyBuf);
    setBar('stab', s, `${s}%`);
  }

  $('debug-box').innerHTML =
    `noiseFloor:&nbsp;&nbsp; ${noiseFloor.toFixed(5)}<br>` +
    `dynThreshold: ${dynThreshold.toFixed(5)}<br>` +
    `vEnergy:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${vEnergy.toFixed(5)}<br>` +
    `dur (live):&nbsp;&nbsp; ${durSec.toFixed(2)}s<br>` +
    `historySize:&nbsp; ${voiceHistory.length}`;

  drawWave(freqArr, N);
  animationFrameId = requestAnimationFrame(runLoop);
}

function getLastSpeechSegmentEnd() {
  if (voiceHistory.length === 0) return lastVoiceMs || performance.now();
  const GAP_MS = 800;
  for (let i = voiceHistory.length - 1; i > 0; i--) {
    const gap = voiceHistory[i].time - voiceHistory[i - 1].time;
    if (gap > GAP_MS) {
      return voiceHistory[i - 1].time;
    }
  }
  return voiceHistory[voiceHistory.length - 1].time;
}

function rateToScore(rate) {
  if (rate <= 0) return 0;
  if (rate >= NORMAL_MIN && rate <= NORMAL_MAX) return 100;
  if (rate < NORMAL_MIN) return Math.round((rate / NORMAL_MIN) * 100);
  return Math.round(Math.max(60, 100 - (rate - NORMAL_MAX) * 10));
}

function calcStab(buf) {
  if (buf.length < 10) return 50;
  const avg = buf.reduce((a,b)=>a+b,0) / buf.length;
  if (avg === 0) return 0;
  const std = Math.sqrt(buf.reduce((a,b)=>a+(b-avg)**2,0) / buf.length);
  const cv  = std / avg;
  return Math.round(Math.max(0, Math.min(1, 1 - (cv - 0.3) / 1.2)) * 100);
}

function drawWave(freqArr, N) {
  const ctx = $('freq-canvas').getContext('2d');
  ctx.clearRect(0, 0, 120, 120);
  ctx.strokeStyle = phase === 'CALIBRATING' ? 'rgba(217,119,6,0.5)' : 'rgba(43,125,233,0.6)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let i = 0; i < N; i += 3) {
    const angle  = (i / N) * Math.PI * 2;
    const offset = (freqArr[i] / 255) * 14;
    const x = 60 + (50 + offset) * Math.cos(angle);
    const y = 60 + (50 + offset) * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
}

function evaluateSpeech(text, confidence) {
  stopAll();
  phase = 'DONE';
  $('mic-circle').className   = 'mic-circle';
  $('mic-icon').textContent   = '📊';
  $('action-btn').textContent = T.btnRetry;
  $('action-btn').className   = 'green';
  $('toggle-details-btn').textContent = T.showMore;

  const cleanText = text.trim().toLowerCase().replace(/\s+/g, '');
  const wordMatched = cleanText ? T.keywords.some(k => {
    return cleanText.includes(k.toLowerCase().replace(/\s+/g, ''));
  }) : false;

  let wordScore = 0, wordLabel = '—';
  const isManual = text === '__manual__' || text === '__no_api__';
  
  if (isManual) {
    wordScore = 50; wordLabel = 'N/A';
    $('transcript-box').textContent = text === '__manual__' ? '[หยุดแมนนวล]' : '[ไม่พบ Speech API]';
  } else if (text === '') {
    wordScore = 0; wordLabel = 'ไม่มีเสียง';
    $('transcript-box').textContent = '[ไม่ได้ยินเสียงคำพูด]';
  } else {
    wordScore = wordMatched ? Math.round(70 + confidence * 30) : Math.round(confidence * 30);
    wordLabel = wordMatched ? `✓ ${(confidence*100).toFixed(0)}%` : `✗ ${(confidence*100).toFixed(0)}%`;
    $('transcript-box').textContent = `"${text}"`;
  }

  let rateScore = 0, rateLabel = '—', syllPerSec = 0, durSec = 0;

  if (speechStartMs && speechEndMs && speechEndMs >= speechStartMs) {
    durSec = (speechEndMs - speechStartMs) / 1000;
    if (durSec < 0.2) durSec = 0.4;

    if (wordMatched || isManual) {
      syllPerSec = T.syllables / durSec;
      rateScore  = rateToScore(syllPerSec);
      rateLabel  = `${syllPerSec.toFixed(1)} syl/s`;
      if (isManual) rateScore = Math.round(rateScore * 0.7);
    } else {
      rateScore = 0; rateLabel = 'คำไม่ตรงประโยค';
    }
  } else {
    rateLabel = 'ไม่พบช่วงสัญญาณเสียง';
  }

  const stabScore = calcStab(vowelEnergyBuf);
  const stabLabel = vowelEnergyBuf.length >= 10 ? `${stabScore}%` : 'ข้อมูลน้อยเกินไป';

  const speechScore = Math.round(wordScore*0.40 + rateScore*0.40 + stabScore*0.20);

  setBar('word', wordScore, wordLabel);
  setBar('rate', rateScore, rateLabel);
  setBar('stab', stabScore, stabLabel);

  const cv = vowelEnergyBuf.length > 10 ? (() => {
    const avg = vowelEnergyBuf.reduce((a,b)=>a+b,0)/vowelEnergyBuf.length;
    if (avg === 0) return '0.0000';
    const std = Math.sqrt(vowelEnergyBuf.reduce((a,b)=>a+(b-avg)**2,0)/vowelEnergyBuf.length);
    return (std/avg).toFixed(4);
  })() : '—';

  $('debug-box').innerHTML =
    `── Final (V3 Trailing) ──<br>` +
    `noiseFloor:&nbsp;&nbsp; ${noiseFloor.toFixed(5)}<br>` +
    `dynThreshold: ${dynThreshold.toFixed(5)}<br>` +
    `transcript:&nbsp;&nbsp; "${text}"<br>` +
    `duration:&nbsp;&nbsp;&nbsp;&nbsp; ${durSec.toFixed(2)}s (Pure Word)<br>` +
    `syllPerSec:&nbsp;&nbsp; ${syllPerSec.toFixed(2)}<br>` +
    `CV:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${cv}<br>` +
    `energyFrames: ${vowelEnergyBuf.length}<br>` +
    `<b>TOTAL:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${speechScore}</b>`;

  let cls, title, sub;
  if      (speechScore >= 70) { cls='ok';   title='ปกติ';          sub='การพูดอยู่ในเกณฑ์ปกติ'; }
  else if (speechScore >= 45) { cls='warn'; title='เฝ้าระวัง';    sub='พบความผิดปกติเล็กน้อย ควรทดสอบซ้ำ'; }
  else                        { cls='bad';  title='ความเสี่ยงสูง'; sub='พบความผิดปกติของการพูด ควรพบแพทย์'; }

  const issues = [];
  if (wordScore < 50) issues.push('คำไม่ถูก/นึกไม่ออก');
  if (rateScore < 40) issues.push(`พูดช้า (${syllPerSec.toFixed(1)} syl/s)`);
  if (stabScore < 40) issues.push('เสียงไม่สม่ำเสมอ');
  if (issues.length)  sub = issues.join(' · ');

  const col = {ok:'var(--green)',warn:'var(--amber)',bad:'var(--red)'}[cls];
  const rb  = $('result-banner');
  rb.className = 'result-banner ' + cls;
  rb.style.display = 'flex';
  $('rb-title').textContent = title; $('rb-title').style.color = col;
  $('rb-score').textContent = speechScore + ' / 100'; $('rb-score').style.color = col;
  $('rb-sub').textContent   = sub;

  const result = {
    score: speechScore,
    riskLevel: cls,
    breakdown: { wordScore, rateScore, stabScore },
    raw: { transcript: text, syllablesPerSec: syllPerSec, durationSec: durSec }
  };
  sessionStorage.setItem('fast_speech', JSON.stringify(result));
  window.SPEECH_RESULT = result;

  handleFastFlow(cls);
}

function handleFastFlow(riskLevel) {
  const mode = sessionStorage.getItem('fast_mode');
  const lang = sessionStorage.getItem('fast_lang') || 'th';
  const allDone = ['fast_face','fast_arm','fast_speech'].every(k => sessionStorage.getItem(k));

  setTimeout(() => {
    const existing = document.getElementById('fast-nav-btn');
    if (existing) existing.remove();

    const btn = document.createElement('button');
    btn.id = 'fast-nav-btn';
    btn.style.cssText = 'width:100%;min-height:54px;border-radius:14px;border:none;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;color:#fff;background:var(--blue);box-shadow:0 4px 12px rgba(43,125,233,0.2);';

    const L = {
      th: { result:'ดูผลรวม FAST →', home:'กลับหน้าหลัก', next:'ทดสอบต่อไป →', incomplete:'พบความผิดปกติ — ควรทดสอบให้ครบทั้ง 3 อาการ' },
      en: { result:'View FAST Score →', home:'Back to Home', next:'Continue →', incomplete:'Abnormality found — complete all 3 tests' }
    }[lang];

    if (mode === 'full') {
      if (allDone) {
        btn.textContent = L.result;
        btn.onclick = () => window.location.href = 'result.html';
      } else {
        btn.textContent = L.home;
        btn.onclick = () => window.location.href = 'index.html';
      }
    } else {
      if (allDone) {
        btn.textContent = L.result;
        btn.style.background = 'var(--green)';
        btn.style.boxShadow = '0 4px 12px rgba(22,163,74,0.2)';
        btn.onclick = () => window.location.href = 'result.html';
      } else {
        btn.textContent = L.home;
        btn.onclick = () => window.location.href = 'index.html';
        if (riskLevel !== 'ok') {
          $('rb-sub').textContent = L.incomplete;
        }
      }
    }

    const actionBtn = $('action-btn');
    actionBtn.parentNode.insertBefore(btn, actionBtn);
  }, 200);
}

(function() {
  const savedLang = sessionStorage.getItem('fast_lang');
  const mode = sessionStorage.getItem('fast_mode');
  if (savedLang && mode && CONFIG[savedLang]) {
    if (typeof selectLang === 'function') selectLang(savedLang);
  }
})();
</script>
